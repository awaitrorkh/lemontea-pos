<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS 系統 - 整合穩定版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
        :root { --p: #27ae60; --dark: #2c3e50; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; background: #f4f4f9; display: flex; height: 100vh; overflow: hidden; }
        
        /* 登入層 */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#f4f4f9; z-index:10000; display:flex; align-items:center; justify-content:center; }
        .login-box { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 14px; background: var(--p); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* POS 佈局 */
        .main-container { display: none; width: 100%; height: 100%; flex-direction: row; }
        .menu-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cart-side { width: 320px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
        
        #nav-tabs { background: white; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 2px solid var(--p); }
        .tab-btn { padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; white-space: nowrap; border: none; }
        
        #item-grid { flex: 1; overflow-y: auto; padding: 15px; display: block; }
        .product-card { display: inline-block; width: 110px; background: white; padding: 15px; margin: 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .product-card b { display: block; height: 40px; overflow: hidden; }
        
        .cart-list { flex: 1; overflow-y: auto; padding: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .checkout-box { padding: 20px; background: #f9f9f9; border-top: 1px solid #ddd; }
        .btn-pay { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; font-weight: bold; }
        
        /* 管理後台 */
        #admin-panel { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9000; display:none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--p); margin-top:0;">小森檸 POS 系統</h2>
            <div id="sys-status" style="font-size:12px; color:#999; margin-bottom:10px;">系統連線檢查中...</div>
            <input type="email" id="login-email" placeholder="管理員帳號">
            <input type="password" id="login-pass" placeholder="密碼">
            <button class="btn-login" id="login-btn" onclick="handleLogin()">進入系統</button>
            <p id="error-msg" style="color:red; font-size:13px; margin-top:10px;"></p>
        </div>
    </div>

    <div class="main-container" id="pos-ui">
        <div class="menu-side">
            <div id="nav-tabs"></div>
            <div id="item-grid"></div>
        </div>
        <div class="cart-side">
            <div style="padding:15px; background:var(--dark); color:white; font-weight:bold;">🛒 目前點餐</div>
            <div class="cart-list" id="cart-content"></div>
            <div class="checkout-box">
                <div style="font-size: 1.5em; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between;">
                    <span>應收總計</span><span>$<span id="total-price">0</span></span>
                </div>
                <button class="btn-pay" onclick="submitOrder()">確認結帳</button>
                <button onclick="checkAdmin()" style="margin-top:15px; width:100%; padding:8px; background:none; border:1px solid #ccc; border-radius:5px; cursor:pointer;">⚙️ 管理後台</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📊 營業報表與管理</h2>
            <button onclick="closeAdmin()" style="padding:10px 20px;">關閉後台</button>
        </div>
        <hr>
        <div style="background:#f0f7f2; padding:20px; border-radius:10px; margin-bottom:20px;">
            <h3>業績查詢</h3>
            從 <input type="date" id="date-s"> 到 <input type="date" id="date-e">
            <button onclick="querySales()" style="padding:8px 15px; background:var(--dark); color:white; border:none; margin-left:10px;">查詢</button>
            <button onclick="exportExcel()" style="padding:8px 15px; background:var(--p); color:white; border:none; margin-left:5px;">📥 導出 Excel</button>
            <div style="margin-top:20px; display:flex; gap:20px;">
                <div style="background:white; padding:15px; flex:1; border-radius:8px; border:1px solid #ddd;">總銷售額：<b id="res-money" style="color:red; font-size:1.5em;">$0</b></div>
                <div style="background:white; padding:15px; flex:1; border-radius:8px; border:1px solid #ddd;">總杯數：<b id="res-cups" style="color:red; font-size:1.5em;">0 杯</b></div>
            </div>
        </div>
        <h3>品項與庫存管理</h3>
        <div id="admin-inv-table"></div>
    </div>

    <script>
        // --- 設定 ---
        var firebaseConfig = {
            apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
            authDomain: "lemontea-ad44d.firebaseapp.com",
            databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
            projectId: "lemontea-ad44d",
            storageBucket: "lemontea-ad44d.appspot.com",
            messagingSenderId: "84807565645",
            appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
        };

        var db, auth, storeID = "", inventory = [], cart = [], orders = {};

        // --- 初始化 ---
        window.onload = function() {
            if (typeof firebase !== "undefined") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                auth = firebase.auth();
                document.getElementById("sys-status").innerText = "✅ 伺服器連線正常";
            } else {
                alert("錯誤：Firebase 載入失敗！請檢查您的網路或關閉 AdBlock。");
            }
        };

        // --- 登入邏輯 ---
        function handleLogin() {
            var email = document.getElementById("login-email").value;
            var pass = document.getElementById("login-pass").value;
            var btn = document.getElementById("login-btn");
            if(!email || !pass) return alert("請輸入完整帳密");

            btn.innerText = "驗證中...";
            auth.signInWithEmailAndPassword(email, pass).then(function(user) {
                storeID = email.split("@")[0].replace(/\./g, "_");
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("pos-ui").style.display = "flex";
                startSync();
            }).catch(function(err) {
                btn.innerText = "進入系統";
                document.getElementById("error-msg").innerText = "無法進入系統：" + err.message;
            });
        }

        // --- 數據同步 ---
        function startSync() {
            db.ref("stores/" + storeID + "/inventory").on("value", function(snap) {
                inventory = snap.val() || [];
                renderPOS();
            });
            db.ref("stores/" + storeID + "/orders").on("value", function(snap) {
                orders = snap.val() || {};
            });
        }

        // --- POS 渲染 ---
        function renderPOS() {
            var tabs = document.getElementById("nav-tabs");
            var grid = document.getElementById("item-grid");
            tabs.innerHTML = ""; grid.innerHTML = "";

            inventory.forEach(function(cat, cidx) {
                tabs.innerHTML += '<button class="tab-btn" onclick="document.getElementById(\'cat-'+cidx+'\').scrollIntoView()">'+cat.cat+'</button>';
                var section = '<div id="cat-'+cidx+'"><h3 style="border-left:5px solid var(--p); padding-left:10px;">'+cat.cat+'</h3>';
                (cat.items || []).forEach(function(it) {
                    section += '<div class="product-card" onclick="addToCart(\''+it.id+'\')">' +
                               '<b>'+it.n+'</b><span style="color:var(--p); font-weight:bold;">$'+it.p+'</span>' +
                               '<br><small style="color:#999">存:'+it.s+'</small></div>';
                });
                grid.innerHTML += section + '</div>';
            });
        }

        function addToCart(id) {
            inventory.forEach(function(c){
                (c.items || []).forEach(function(it){
                    if(it.id === id) { cart.push(JSON.parse(JSON.stringify(it))); renderCart(); }
                });
            });
        }

        function renderCart() {
            var box = document.getElementById("cart-content");
            var total = 0;
            box.innerHTML = "";
            cart.forEach(function(it, idx) {
                total += it.p;
                box.innerHTML += '<div class="cart-item"><span>'+it.n+'</span><b>$'+it.p+'</b><span onclick="cart.splice('+idx+',1);renderCart()" style="color:red; cursor:pointer;">✕</span></div>';
            });
            document.getElementById("total-price").innerText = total;
        }

        // --- 結帳功能 ---
        function submitOrder() {
            if(cart.length === 0) return alert("請先選擇飲品");
            var now = new Date();
            var dateStr = now.getFullYear() + "-" + ("0"+(now.getMonth()+1)).slice(-2) + "-" + ("0"+now.getDate()).slice(-2);
            
            var orderData = {
                d: dateStr,
                t: now.getHours() + ":" + now.getMinutes(),
                total: parseInt(document.getElementById("total-price").innerText),
                items: cart.map(function(i){ return {n: i.n, p: i.p}; })
            };

            // 扣庫存
            cart.forEach(function(cItem){
                inventory.forEach(function(cat){
                    (cat.items || []).forEach(function(i){ if(i.id === cItem.id) i.s--; });
                });
            });

            db.ref("stores/" + storeID + "/orders").push(orderData).then(function(){
                db.ref("stores/" + storeID + "/inventory").set(inventory);
                alert("結帳成功！");
                cart = []; renderCart();
            });
        }

        // --- 管理後台功能 ---
        function checkAdmin() {
            var p = prompt("請輸入管理密碼");
            if(p === "8888") {
                document.getElementById("admin-panel").style.display = "flex";
                var today = new Date().toISOString().split('T')[0];
                document.getElementById("date-s").value = today;
                document.getElementById("date-e").value = today;
                querySales();
            }
        }
        function closeAdmin() { document.getElementById("admin-panel").style.display = "none"; }

        function querySales() {
            var s = document.getElementById("date-s").value;
            var e = document.getElementById("date-e").value;
            var money = 0, cups = 0;
            Object.values(orders).forEach(function(o){
                var oDate = o.d.replace(/\//g, "-");
                if(oDate >= s && oDate <= e) {
                    money += o.total;
                    if(o.items) cups += o.items.length;
                }
            });
            document.getElementById("res-money").innerText = "$" + money;
            document.getElementById("res-cups").innerText = cups + " 杯";
        }

        function exportExcel() {
            var s = document.getElementById("date-s").value;
            var e = document.getElementById("date-e").value;
            var rows = [];
            Object.values(orders).forEach(function(o){
                var oDate = o.d.replace(/\//g, "-");
                if(oDate >= s && oDate <= e) {
                    rows.push({ "日期": o.d, "金額": o.total, "杯數": o.items ? o.items.length : 0, "明細": o.items ? o.items.map(function(i){return i.n}).join(",") : "" });
                }
            });
            if(rows.length === 0) return alert("選定日期無資料");
            var ws = XLSX.utils.json_to_sheet(rows);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "業績");
            XLSX.writeFile(wb, "小森檸業績_" + s + ".xlsx");
        }
    </script>
</body>
</html>
