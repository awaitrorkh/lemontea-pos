<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小森檸 POS - 管理加強版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #62ad72; --s: #d99a4e; --bg: #ffffff; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
            background: var(--bg); font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; 
        }

        header { 
            background: var(--p); color: white; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }

        #pos-screen { display: flex; flex-direction: column; flex: 1; height: 100%; overflow: hidden; }

        #main-grid { 
            flex: 1; overflow-y: auto; padding: 15px; 
            padding-bottom: 220px;
            -webkit-overflow-scrolling: touch; 
        }

        .cat-section { margin-bottom: 25px; }
        .cat-name { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #555; border-left: 4px solid var(--p); padding-left: 10px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .p-card { 
            background: #fff; padding: 15px 5px; border-radius: 12px; text-align: center; 
            border: 1px solid #f0f0f0; min-height: 95px; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .p-card b { font-size: 14px; color: #333; margin-bottom: 5px; }
        .p-card span { color: var(--p); font-weight: bold; font-size: 15px; }

        .cart-bar { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #eee; z-index: 100;
        }
        .cart-status { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; }
        .total-price { font-size: 34px; font-weight: 800; color: var(--s); }

        .btn-group { display: flex; gap: 10px; height: 60px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 12px; flex: 1; font-size: 20px; font-weight: bold; }
        .btn-tool { background: #f0f2f5; border: none; border-radius: 12px; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        #checkout-screen { 
            position: fixed; inset: 0; background: #2c3e50; z-index: 3000; 
            display: none; flex-direction: column; padding: 20px; color: white; 
        }
        .calc-display { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1; }
        .n-btn { background: #445566; border: none; color: white; font-size: 28px; border-radius: 12px; font-weight: bold; min-height: 65px; }
        .n-btn.action { background: var(--s); }
        .n-btn.confirm { background: var(--p); grid-column: span 2; }

        /* 管理後台樣式 */
        #staff-login, #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; }
        #admin-screen { display: none; overflow-y: auto; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); }
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; color: #333; }
        .stat-row { display: flex; justify-content: space-around; text-align: center; margin-bottom: 15px; }
        .stat-item b { display: block; font-size: 20px; color: var(--p); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; font-size: 15px; }
        
        .staff-list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #eee;
        }
        .del-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="staff-login">
        <div style="padding: 80px 20px; text-align: center;">
            <h2 style="color:var(--p); margin-bottom:30px;">小森檸POS</h2>
            <input type="password" id="staff-input" placeholder="輸入代碼" maxlength="4" inputmode="numeric" style="font-size:32px; text-align:center; width:220px; border:none; border-bottom:2px solid var(--p); padding:10px;">
            <br>
            <button onclick="POS.login()" style="width:220px; padding:15px; background:var(--p); color:white; border-radius:12px; border:none; font-size:18px; font-weight:bold; margin-top:30px;">登入</button>
        </div>
    </div>

    <!-- POS 主畫面 -->
    <div id="pos-screen" style="display:none;">
        <header>
            <span id="user-display">👤 載入中...</span>
            <span style="font-weight:bold;">小森檸POS</span>
        </header>
        <div id="main-grid"></div>
        <div class="cart-bar">
            <div id="cart-tags" style="display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; height:32px;"></div>
            <div class="cart-status">
                <div style="color:#888;">已選 <b id="cart-num" style="color:var(--p)">0</b> 杯</div>
                <div class="total-price">$<span id="cart-total">0</span></div>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCalc()">結帳找零</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 計算機 -->
    <div id="checkout-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:22px;">找零計算</h2>
            <span onclick="POS.closeCalc()" style="font-size:32px; padding:10px;">✕</span>
        </div>
        <div class="calc-display">
            <div style="display:flex; justify-content:space-between; opacity:0.7; font-size:14px;"><span>應收</span><span>實收</span></div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-top:10px;">
                <span id="calc-need" style="font-size:26px;">$0</span>
                <span id="calc-in" style="font-size:42px; color:#52c41a; font-weight:bold;">0</span>
            </div>
        </div>
        <div style="background:var(--s); padding:15px; border-radius:12px; text-align:center; font-size:22px; font-weight:bold; margin-bottom:20px;">找零：$<span id="calc-change">0</span></div>
        <div class="num-grid">
            <button class="n-btn" onclick="POS.press('7')">7</button><button class="n-btn" onclick="POS.press('8')">8</button><button class="n-btn" onclick="POS.press('9')">9</button><button class="n-btn action" onclick="POS.press('C')">C</button>
            <button class="n-btn" onclick="POS.press('4')">4</button><button class="n-btn" onclick="POS.press('5')">5</button><button class="n-btn" onclick="POS.press('6')">6</button><button class="n-btn action" onclick="POS.press('00')">00</button>
            <button class="n-btn" onclick="POS.press('1')">1</button><button class="n-btn" onclick="POS.press('2')">2</button><button class="n-btn" onclick="POS.press('3')">3</button><button class="n-btn" onclick="POS.press('0')">0</button>
            <button class="n-btn confirm" onclick="POS.submitPay()">確認結帳</button><button class="n-btn action" style="grid-column: span 2; background:#666;" onclick="POS.closeCalc()">取消</button>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="color:var(--p)">管理後台</h3>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="border:none; background:#eee; padding:8px 15px; border-radius:8px;">✕ 關閉</button>
        </div>

        <!-- 1. 今日統計 -->
        <div class="admin-box">
            <p style="font-weight:bold; margin-bottom:10px;">今日即時營收</p>
            <div class="stat-row">
                <div class="stat-item">今日營業額<b id="stat-today-rev">$0</b></div>
                <div class="stat-item">今日總杯數<b id="stat-today-qty">0 杯</b></div>
            </div>
        </div>

        <!-- 2. 報表導出 -->
        <div class="admin-box">
            <p style="font-weight:bold;">日期區間統計與導出</p>
            <div style="display:flex; gap:5px;"><input type="date" id="date-start"><input type="date" id="date-end"></div>
            <button onclick="POS.exportCSV()" style="width:100%; padding:12px; background:var(--p); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">下載統計報表 (CSV)</button>
        </div>

        <!-- 3. 員工管理 -->
        <div class="admin-box">
            <p style="font-weight:bold; margin-bottom:10px;">員工名單管理</p>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-staff-name" placeholder="姓名">
                <input type="text" id="new-staff-code" placeholder="代碼" maxlength="4">
            </div>
            <button onclick="POS.addStaff()" style="width:100%; padding:10px; background:var(--s); color:white; border:none; border-radius:8px; margin-top:5px;">＋ 新增員工</button>
            <div id="staff-list-container" style="margin-top:15px;">
                <!-- 員工清單會渲染在此 -->
            </div>
        </div>
    </div>

    <script>
        const POS = {
            dbCfg: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main",
            staff: [], inv: [], cart: [], user: null, inStr: "0",

            init() {
                firebase.initializeApp(this.dbCfg);
                // 監聽員工資料
                firebase.database().ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staff = s.val() ? Object.keys(s.val()).map(k => ({...s.val()[k], id: k})) : [];
                    this.renderStaffList();
                });
                // 監聽菜單
                firebase.database().ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [];
                    this.renderGrid();
                });
                // 預設日期
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date-start').value = today;
                document.getElementById('date-end').value = today;
                this.updateTodayStats();
            },

            login() {
                const code = document.getElementById("staff-input").value;
                const found = this.staff.find(s => s.code == code);
                if(found) {
                    this.user = found;
                    document.getElementById("user-display").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else alert("代碼錯誤");
            },

            renderGrid() {
                const grid = document.getElementById("main-grid"); grid.innerHTML = "";
                this.inv.forEach(c => {
                    let h = `<div class="cat-section"><div class="cat-name">${c.cat}</div><div class="items-flex">`;
                    if(c.items) c.items.forEach(it => h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`);
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({n, p, id: Date.now()});
                this.updateUI();
            },

            updateUI() {
                const total = this.cart.reduce((a,b)=>a+b.p, 0);
                document.getElementById("cart-num").innerText = this.cart.length;
                document.getElementById("cart-total").innerText = total;
                const tags = document.getElementById("cart-tags"); tags.innerHTML = "";
                this.cart.forEach(it => {
                    const span = document.createElement("span");
                    span.innerText = it.n + " ✕";
                    span.style = "background:#f0f0f0; padding:4px 10px; border-radius:8px; font-size:13px; white-space:nowrap;";
                    span.onclick = () => { this.cart = this.cart.filter(x => x.id != it.id); this.updateUI(); };
                    tags.appendChild(span);
                });
            },

            openCalc() {
                const total = parseInt(document.getElementById("cart-total").innerText);
                if(total <= 0) return;
                this.inStr = "0"; 
                document.getElementById("calc-in").innerText = "0";
                document.getElementById("calc-change").innerText = "0";
                document.getElementById("calc-need").innerText = "$" + total;
                document.getElementById("checkout-screen").style.display = "flex";
            },

            closeCalc() { document.getElementById("checkout-screen").style.display = "none"; },

            press(v) {
                if(v === 'C') this.inStr = "0";
                else if(v === '00') this.inStr = (this.inStr === "0") ? "0" : this.inStr + "00";
                else this.inStr = (this.inStr === "0") ? v : this.inStr + v;
                document.getElementById("calc-in").innerText = this.inStr;
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const change = parseInt(this.inStr) - need;
                document.getElementById("calc-change").innerText = change > 0 ? change : 0;
            },

            submitPay() {
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const input = parseInt(this.inStr);
                if(input < need) return alert("金額不足");
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                this.cart.forEach(it => {
                    firebase.database().ref(`stores/${this.storeID}/sales/${today}`).push({
                        t: time, s: this.user.name, n: it.n, p: it.p
                    });
                });
                alert("結帳完成");
                this.cart = []; this.updateUI(); this.closeCalc();
                this.updateTodayStats();
            },

            // --- 後台補全功能 ---
            updateTodayStats() {
                const today = new Date().toISOString().split('T')[0];
                firebase.database().ref(`stores/${this.storeID}/sales/${today}`).once("value", snap => {
                    const data = snap.val() || {};
                    let rev = 0, qty = 0;
                    Object.values(data).forEach(v => { rev += v.p; qty++; });
                    document.getElementById("stat-today-rev").innerText = "$" + rev;
                    document.getElementById("stat-today-qty").innerText = qty + " 杯";
                });
            },

            exportCSV() {
                const s = document.getElementById('date-start').value;
                const e = document.getElementById('date-end').value;
                firebase.database().ref(`stores/${this.storeID}/sales`).once("value", snap => {
                    const allData = snap.val() || {};
                    let csv = "\uFEFF日期,時間,員工,品項,金額\n";
                    let totalP = 0, totalQ = 0;
                    Object.keys(allData).sort().forEach(date => {
                        if(date >= s && date <= e) {
                            Object.values(allData[date]).forEach(v => {
                                csv += `${date},${v.t},${v.s},${v.n},${v.p}\n`;
                                totalP += v.p; totalQ++;
                            });
                        }
                    });
                    csv += `\n總計區間,,${s} ~ ${e},總杯數:${totalQ},總營收:${totalP}`;
                    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `小森檸統計_${s}_to_${e}.csv`;
                    link.click();
                });
            },

            renderStaffList() {
                const container = document.getElementById("staff-list-container");
                container.innerHTML = "";
                this.staff.forEach(st => {
                    const item = document.createElement("div");
                    item.className = "staff-list-item";
                    item.innerHTML = `<span>${st.name} (${st.code})</span><button class="del-btn" onclick="POS.deleteStaff('${st.id}')">刪除</button>`;
                    container.appendChild(item);
                });
            },

            addStaff() {
                const name = document.getElementById("new-staff-name").value;
                const code = document.getElementById("new-staff-code").value;
                if(!name || code.length < 4) return alert("請輸入正確姓名與4位代碼");
                firebase.database().ref(`stores/${this.storeID}/staff`).push({ name, code });
                document.getElementById("new-staff-name").value = "";
                document.getElementById("new-staff-code").value = "";
            },

            deleteStaff(id) {
                if(confirm("確定要刪除這位員工嗎？")) {
                    firebase.database().ref(`stores/${this.storeID}/staff/${id}`).remove();
                }
            },

            openAdmin() {
                if(prompt("請輸入管理密碼") === "8888") {
                    this.updateTodayStats();
                    document.getElementById("admin-screen").style.display = "block";
                }
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
