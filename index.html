<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 企業旗艦版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 登入介面 */
        #staff-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #fff; padding: 40px 30px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-card h1 { color: var(--p); margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        .login-card input { font-size: 32px; text-align: center; letter-spacing: 10px; width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin-bottom: 25px; outline: none; display: block; }

        /* 頂部 Header */
        header { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; min-height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .revenue-tag { background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; display: none; border: 1px solid rgba(255,255,255,0.2); }

        /* 分類橫排導航 */
        .nav-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; scrollbar-width: none; }
        .nav-btn { padding: 10px 22px; background: #f0f2f5; border: none; border-radius: 25px; white-space: nowrap; font-weight: bold; font-size: 15px; color: #555; }
        .nav-btn.active { background: var(--p); color: #fff; }

        /* 商品區 (三欄大按鈕佈局) */
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 340px; }
        .category-title { font-size: 18px; font-weight: 800; margin: 15px 0 12px 5px; padding-left: 10px; border-left: 5px solid var(--p); color: #333; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .p-card { background: #fff; padding: 15px 5px; border-radius: 18px; text-align: center; border: 1px solid rgba(0,0,0,0.05); height: 105px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .p-card:active { transform: scale(0.92); background: #f0fcf5; border-color: var(--p); }
        .p-card b { font-size: 15px; margin-bottom: 6px; display: block; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-card span { font-size: 14px; color: var(--p); font-weight: 900; }

        /* 底部購物車與操作區 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 2px solid #eee; padding: 15px 20px 35px; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); z-index: 1000; }
        .cart-list-wrapper { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; min-height: 50px; align-items: center; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .cart-item-tag { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; padding: 8px 15px; border-radius: 12px; font-size: 14px; white-space: nowrap; display: flex; align-items: center; gap: 8px; animation: pop 0.2s ease-out; }
        .cart-item-tag::after { content: '✕'; font-weight: bold; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .btn-group { display: flex; gap: 12px; height: 60px; }
        .btn-main { background: var(--p); color: #fff; border: none; border-radius: 15px; font-weight: 900; flex: 2; font-size: 22px; }
        .btn-logout { background: #f8f9fa; border: 1px solid #ddd; border-radius: 15px; flex: 1; color: #666; font-weight: bold; }
        .btn-side { background: #f8f9fa; border: 1px solid #ddd; border-radius: 15px; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* 後台介面 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; padding: 25px; }
        
        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <!-- 員工登入 -->
    <div id="staff-login">
        <div class="login-card">
            <h1>小森檸 POS</h1>
            <input type="password" id="staff-code" placeholder="輸入代碼" maxlength="4" inputmode="numeric">
            <button class="btn-main" style="width:100%" onclick="POS.staffLogin()">進入系統</button>
        </div>
    </div>

    <!-- POS 主畫面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <span id="current-staff-name" style="font-weight:bold; font-size:18px;">載入中...</span>
            <div id="boss-revenue-tag" class="revenue-tag">
                今日: $<span id="st-sum">0</span> (<span id="st-count">0</span>杯)
            </div>
        </header>

        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>

        <div class="cart-bar">
            <!-- 即時點餐清單 -->
            <div class="cart-list-wrapper" id="cart-list-ui">
                <span style="color:#ccc; font-size:14px;">點擊品項開始點餐...</span>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:15px;">
                <span style="font-size:16px; color:#666;">已選 <b id="cart-count" style="font-size:22px; color:#333;">0</b> 杯</span>
                <span style="font-weight:bold; font-size:32px; color:var(--s);">$<span id="total-val">0</span></span>
            </div>
            
            <div class="btn-group">
                <button onclick="POS.doCheckout()" class="btn-main">確認結帳</button>
                <button onclick="location.reload()" class="btn-logout">交班</button>
                <button onclick="POS.openAdmin()" class="btn-side">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2>管理後台</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="border:none; background:#eee; width:40px; height:40px; border-radius:50%; font-size:20px;">✕</button>
        </div>
        <div style="background:var(--p); color:white; padding:25px; border-radius:20px; text-align:center; margin-bottom:25px;">
            <p style="opacity:0.9; margin-bottom:10px;">今日累計營業額</p>
            <h1 id="ad-sum" style="font-size:48px;">$0</h1>
            <p style="margin-top:10px; font-weight:bold;">累計杯數：<span id="ad-count">0</span> 杯</p>
        </div>
        <button class="btn-main" style="width:100%; background:var(--s); margin-bottom:30px; height:60px;" onclick="POS.exportCSV()">📊 匯出今日報表 (CSV)</button>
        
        <div style="background:#f8f9fa; padding:20px; border-radius:15px; border:1px solid #eee;">
            <h3 style="margin-bottom:15px;">員工代碼管理</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="new-staff-name" placeholder="姓名" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;">
                <input type="text" id="new-staff-code" placeholder="代碼" style="flex:1; padding:12px; border-radius:10px; border:1px solid #ddd;">
                <button onclick="POS.addStaff()" style="background:var(--p); color:white; border:none; padding:0 20px; border-radius:10px; font-weight:bold;">新增</button>
            </div>
            <div id="staff-manager-list"></div>
        </div>
    </div>

    <script>
        const POS = {
            config: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                authDomain: "lemontea-ad44d.firebaseapp.com",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main", 
            inv: [], cart: [], staffList: [], sales: [], currentStaff: null,

            init() {
                firebase.initializeApp(this.config);
                this.startSync();
                document.getElementById("staff-code").addEventListener("keyup", (e) => { if (e.key === "Enter") this.staffLogin(); });
            },

            startSync() {
                const db = firebase.database();
                const today = new Date().toISOString().split('T')[0];

                // 員工資料同步 (含強制寫入機制)
                db.ref(`stores/${this.storeID}/staff`).on("value", s => {
                    const data = s.val();
                    if (!data || data.length === 0) {
                        const initStaff = [{name: "老闆", code: "8888"}, {name: "員工", code: "0001"}];
                        db.ref(`stores/${this.storeID}/staff`).set(initStaff);
                        this.staffList = initStaff;
                    } else {
                        this.staffList = data;
                    }
                    this.renderAdminStaff();
                });

                db.ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [{cat: "熱門飲品", items: [{n:"招牌檸檬茶", p:55}]}];
                    if(!s.val()) db.ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    this.renderGrid();
                });

                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = s.val() ? Object.values(s.val()) : [];
                    this.updateRevenueUI();
                });
            },

            staffLogin() {
                const code = document.getElementById("staff-code").value;
                const found = this.staffList.find(s => String(s.code) === String(code));
                if (found) {
                    this.currentStaff = found;
                    document.getElementById("current-staff-name").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { 
                    alert("代碼錯誤，請重新輸入。"); // 已移除代碼洩漏提示
                }
            },

            renderGrid() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    const btn = document.createElement("button");
                    btn.className = "nav-btn" + (ci === 0 ? " active" : "");
                    btn.innerText = c.cat;
                    btn.onclick = (e) => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(`c-${ci}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                    tabs.appendChild(btn);
                    let h = `<div id="c-${ci}"><div class="category-title">${c.cat}</div><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({ n, p, id: Date.now() + Math.random() });
                this.updateCartUI();
            },

            updateCartUI() {
                const list = document.getElementById("cart-list-ui");
                list.innerHTML = "";
                let total = 0;
                if(this.cart.length === 0) {
                    list.innerHTML = `<span style="color:#ccc; font-size:14px;">點擊品項開始點餐...</span>`;
                } else {
                    this.cart.forEach(item => {
                        total += item.p;
                        const tag = document.createElement("div");
                        tag.className = "cart-item-tag";
                        tag.innerText = item.n;
                        tag.onclick = () => { this.cart = this.cart.filter(i => i.id !== item.id); this.updateCartUI(); };
                        list.appendChild(tag);
                    });
                    list.scrollLeft = list.scrollWidth;
                }
                document.getElementById("total-val").innerText = total;
                document.getElementById("cart-count").innerText = this.cart.length;
            },

            doCheckout() {
                if (this.cart.length === 0) return;
                const total = parseInt(document.getElementById("total-val").innerText);
                const cash = prompt(`總計 $${total}\n請輸入實收金額：`);
                
                if (cash !== null) {
                    const change = parseInt(cash) - total;
                    if (change < 0) {
                        alert("金額不足！");
                    } else {
                        // 醒目找零大字體彈窗
                        alert(`【 找 零 確 認 】\n\n應收：$${total}\n實收：$${cash}\n\n👉 找零：$${change}`);
                        
                        const today = new Date().toISOString().split('T')[0];
                        const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                        this.cart.forEach(item => {
                            firebase.database().ref(`stores/${this.storeID}/sales/${today}`).push({
                                t: time, s: this.currentStaff.name, n: item.n, p: item.p
                            });
                        });
                        this.cart = [];
                        this.updateCartUI();
                    }
                }
            },

            updateRevenueUI() {
                const sum = this.sales.reduce((a, b) => a + b.p, 0);
                const count = this.sales.length;
                document.getElementById("st-sum").innerText = sum;
                document.getElementById("st-count").innerText = count;
                document.getElementById("ad-sum").innerText = "$" + sum;
                document.getElementById("ad-count").innerText = count;
            },

            openAdmin() {
                const pw = prompt("請輸入管理權限密碼");
                if (pw === "8888") {
                    document.getElementById("admin-screen").style.display = "block";
                    document.getElementById("boss-revenue-tag").style.display = "block";
                }
            },

            exportCSV() {
                const today = new Date().toISOString().split('T')[0];
                let csv = "\uFEFF時間,員工,品項,金額\n";
                this.sales.forEach(s => csv += `${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `小森檸報表_${this.storeID}_${today}.csv`;
                link.click();
            },

            renderAdminStaff() {
                const list = document.getElementById("staff-manager-list");
                list.innerHTML = "";
                this.staffList.forEach((s, i) => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; background:#fff; padding:12px; border-radius:10px; margin-bottom:8px; border:1px solid #eee;"><span>${s.name} (${s.code})</span><button onclick="POS.delStaff(${i})" style="color:var(--danger); border:none; background:none; font-weight:bold;">刪除</button></div>`;
                });
            },
            addStaff() {
                const n = document.getElementById("new-staff-name").value, c = document.getElementById("new-staff-code").value;
                if(n && c) {
                    this.staffList.push({name:n, code:c});
                    firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staffList);
                    document.getElementById("new-staff-name").value = "";
                    document.getElementById("new-staff-code").value = "";
                }
            },
            delStaff(i) {
                if(confirm("確定移除此員工權限？")) {
                    this.staffList.splice(i, 1);
                    firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staffList);
                }
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
