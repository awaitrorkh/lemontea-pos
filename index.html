<script>
    // --- 1. Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
        authDomain: "lemontea-ad44d.firebaseapp.com",
        databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
        projectId: "lemontea-ad44d",
        storageBucket: "lemontea-ad44d.appspot.com",
        messagingSenderId: "84807565645",
        appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
    };

    // --- 2. 全域變數 ---
    let db;
    window.currentStore = ""; 
    let inv = []; 
    let orders = [];
    let cart = []; 
    let currentPay = '現金';

    const defaultInv = [
        { cat: "🍋 招牌系列", items: [{id: "L01", n: "經典檸檬塔", c: 40, p: 80, s: 50}] },
        { cat: "🧋 泰奶系列", items: [{id: "T01", n: "正宗泰式奶茶", c: 30, p: 65, s: 100}] }
    ];

    // --- 3. 初始化 ---
    function initApp() {
        try {
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                console.log("✅ Firebase 連結成功");
            }
        } catch(e) { console.error("初始化失敗:", e); }
    }
    initApp();

    // --- 4. 登入與資料流 ---
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if(!email || !pass) return alert("請輸入帳號密碼");

        firebase.auth().signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                window.currentStore = email.split('@')[0];
                document.getElementById('login-overlay').style.display = 'none';
                alert("店鋪登入成功：" + window.currentStore);
                loadData(); 
            })
            .catch((error) => alert("登入失敗：" + error.message));
    }

    function loadData() {
        if(!window.currentStore || !db) return; 
        const storePath = `stores/${window.currentStore}`; 

        db.ref(`${storePath}/inventory`).on('value', snap => {
            inv = snap.val() || defaultInv;
            initUI();
        });

        db.ref(`${storePath}/orders`).on('value', snap => {
            const data = snap.val();
            orders = data ? Object.keys(data).map(k => ({...data[k], firebaseKey: k})) : [];
            orders.sort((a,b) => (b.d+b.t).localeCompare(a.d+a.t));
            updateLog(); 
            renderStatTable();
        });
    }

    // --- 5. 核心邏輯：修正警告的關鍵區塊 ---
    
    // 修正點：確保存入資料庫前一定是數字，防止「cannot be parsed」
    function editItem(ci, ii, k, v) { 
        if (k === 'c' || k === 'p' || k === 's') {
            inv[ci].items[ii][k] = Number(v) || 0; 
        } else {
            inv[ci].items[ii][k] = v; 
        }
        syncToDB(); 
    }

    // 修正點：確保渲染時 input 欄位一定有數字 0，防止警告
    function renderAdminTable() {
        let html = '';
        inv.forEach((cat, ci) => {
            html += `<tr style="background:#eee;"><td colspan="6" style="text-align:left; padding:10px;"><b>📂 ${cat.cat}</b></td></tr>`;
            (cat.items || []).forEach((it, ii) => {
                html += `<tr>
                    <td>-</td>
                    <td style="text-align:left;"><input type="text" value="${it.n || ''}" onchange="editItem(${ci},${ii},'n',this.value)" style="width:120px;"></td>
                    <td><input type="number" value="${it.c || 0}" onchange="editItem(${ci},${ii},'c',this.value)" style="width:50px;"></td>
                    <td><input type="number" value="${it.p || 0}" onchange="editItem(${ci},${ii},'p',this.value)" style="width:50px;"></td>
                    <td><input type="number" value="${it.s || 0}" onchange="editItem(${ci},${ii},'s',this.value)" style="width:50px;"></td>
                    <td><span onclick="delP(${ci},${ii})" style="color:red; cursor:pointer;">✕</span></td>
                </tr>`;
            });
        });
        document.getElementById('admin-tbody').innerHTML = html;
    }

    // --- 6. 其他必要功能 ---
    function syncToDB() {
        if(db && window.currentStore) {
            db.ref(`stores/${window.currentStore}/inventory`).set(inv);
        }
    }

    function submitOrder() {
        if(!cart.length || !window.currentStore) return;
        const total = Number(document.getElementById('final-total').innerText);
        const orderData = { 
            t: new Date().toLocaleTimeString('zh-TW', {hour12:false}), 
            d: new Date().toLocaleDateString('zh-TW'),
            total, 
            profit: total - cart.reduce((a,b)=>a+(b.c||0), 0), 
            pay: currentPay, 
            items: [...cart]
        };
        
        cart.forEach(item => { 
            inv.forEach(c => (c.items || []).forEach(i => { if(i.id === item.id) i.s--; })); 
        });
        
        const storePath = `stores/${window.currentStore}`;
        db.ref(`${storePath}/orders`).push(orderData);
        db.ref(`${storePath}/inventory`).set(inv);
        
        alert("結帳完成！");
        cart=[]; 
        renderCart(); 
        initUI();
    }

    function initUI() {
        const area = document.getElementById('item-area'), nav = document.getElementById('navbar');
        area.innerHTML = ''; nav.innerHTML = '';
        inv.forEach((cat, idx) => {
            nav.innerHTML += `<div class="nav-btn" onclick="document.getElementById('c${idx}').scrollIntoView()">${cat.cat}</div>`;
            let gridHtml = `<div class="cat-title" id="c${idx}">${cat.cat}</div><div class="product-grid">`;
            (cat.items || []).forEach(it => {
                gridHtml += `<div class="p-btn" onclick="addCart('${it.id}')">
                    <div class="p-name">${it.n}</div>
                    <div class="p-price">$${it.p}</div>
                    <div class="p-stock">存:${it.s}</div>
                </div>`;
            });
            area.innerHTML += gridHtml + '</div>';
        });
        if(document.getElementById('admin-panel').style.display === 'flex') renderAdminTable();
    }

    function addCart(id) {
        let target = null;
        inv.forEach(c => (c.items || []).forEach(i => { if(i.id === id) target = i; }));
        if(target) { cart.push({...target}); renderCart(); }
    }

    function renderCart() {
        document.getElementById('cart-list').innerHTML = cart.map((it, i) => `
            <div class="cart-item"><span>${it.n}</span><b>$${it.p}</b>
            <span onclick="cart.splice(${i},1);renderCart()" style="color:red; cursor:pointer;">✕</span></div>`).join('');
        const total = cart.reduce((a,b)=>a+b.p, 0);
        document.getElementById('final-total').innerText = total;
    }

    function setPay(m) {
        currentPay = m;
        document.getElementById('btn-cash').className = m==='現金'?'pay-btn active':'pay-btn';
        document.getElementById('btn-elec').className = m==='電支'?'pay-btn active':'pay-btn';
    }

    function toggleAdmin() { 
        const p = document.getElementById('admin-panel'); 
        p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; 
        if(p.style.display === 'flex') renderAdminTable(); 
    }
    
    function delP(ci, ii) { if(confirm("確定刪除商品？")){ inv[ci].items.splice(ii,1); syncToDB(); } }
</script>
