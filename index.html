<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 旗艦修正版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f8f9fa; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 登入畫面修正 */
        #staff-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #fff; padding: 40px 25px; border-radius: 30px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .login-card h1 { color: var(--p); margin-bottom: 20px; font-size: 24px; }
        .login-card input { font-size: 24px; text-align: center; letter-spacing: 8px; width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; margin-bottom: 20px; outline: none; display: block; }

        /* 頂部導航 */
        header { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; min-height: 60px; }
        .revenue-tag { background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; display: none; }

        /* 分類導航 */
        .nav-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .nav-btn { padding: 8px 18px; background: #f2f2f2; border: none; border-radius: 20px; white-space: nowrap; font-weight: 600; font-size: 14px; }
        .nav-btn.active { background: var(--p); color: #fff; }

        /* 商品區 */
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 300px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 0 10px 5px; padding-left: 10px; border-left: 6px solid var(--p); }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { background: #fff; padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid rgba(0,0,0,0.05); height: 90px; display: flex; flex-direction: column; justify-content: center; }
        .p-card:active { transform: scale(0.95); background: #f0fcf5; }
        .p-card b { font-size: 14px; color: #333; }
        .p-card span { font-size: 13px; color: var(--p); font-weight: bold; }

        /* 底部工具欄 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 2px solid #eee; padding: 15px 20px 30px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .cart-list-wrapper { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; min-height: 45px; align-items: center; }
        .cart-item-tag { background: #fff1f0; color: #f5222d; border: 1px solid #ffa39e; padding: 6px 12px; border-radius: 10px; font-size: 13px; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .cart-item-tag::after { content: '✕'; font-weight: bold; background: #f5222d; color: white; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        .btn-group { display: flex; gap: 10px; height: 50px; }
        .btn-main { background: var(--p); color: #fff; border: none; border-radius: 12px; font-weight: bold; flex: 2; font-size: 18px; }
        .btn-logout { background: #f5f5f5; border: 1px solid #ddd; border-radius: 12px; flex: 1; font-size: 14px; color: #666; }
        .btn-side { background: #f5f5f5; border: 1px solid #ddd; border-radius: 12px; width: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; padding: 20px; }
        .stat-card { background: var(--p); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .admin-section { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .admin-row { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .admin-row input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-add { background: var(--p); color: white; border: none; padding: 8px 15px; border-radius: 8px; }
        .list-item { background: #fff; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 登入介面 -->
    <div id="staff-login">
        <div class="login-card">
            <h1>小森檸 POS</h1>
            <input type="password" id="staff-code" placeholder="代碼" maxlength="4" inputmode="numeric">
            <button class="btn-main" style="width:100%" onclick="POS.staffLogin()">登入系統</button>
        </div>
    </div>

    <!-- POS 主畫面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <span id="current-staff-name" style="font-weight:bold;">載入中...</span>
            <div id="boss-revenue-tag" class="revenue-tag">
                今日: $<span id="st-sum">0</span> (<span id="st-count">0</span>杯)
            </div>
        </header>

        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>

        <div class="cart-bar">
            <div class="cart-list-wrapper" id="cart-list-ui"></div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
                <span style="font-size:14px; color:#666;">已選 <b id="cart-count">0</b> 杯</span>
                <span style="font-weight:bold; font-size:22px; color:var(--s);">$<span id="total-val">0</span></span>
            </div>
            <div class="btn-group">
                <button onclick="POS.doCheckout()" class="btn-main">確認結帳</button>
                <button onclick="location.reload()" class="btn-logout">交班</button>
                <button onclick="POS.openAdmin()" class="btn-side">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>管理後台</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="border:none; background:none; font-size:24px;">✕</button>
        </div>
        <div class="stat-card">
            <p>今日累計營收</p>
            <h1 id="ad-sum">$0</h1>
            <p>累計杯數：<span id="ad-count">0</span> 杯</p>
        </div>
        <button class="btn-main" style="width:100%; background:var(--s); margin-bottom:20px;" onclick="POS.exportCSV()">📊 匯出今日 CSV 報表</button>

        <div class="admin-section">
            <h3>員工管理</h3>
            <div class="admin-row">
                <input type="text" id="new-staff-name" placeholder="姓名">
                <input type="text" id="new-staff-code" placeholder="代碼">
                <button class="btn-add" onclick="POS.addStaff()">新增</button>
            </div>
            <div id="staff-manager-list"></div>
        </div>

        <div class="admin-section">
            <h3>品項管理</h3>
            <div class="admin-row">
                <input type="text" id="new-p-cat" placeholder="種類" style="flex:100%">
                <input type="text" id="new-p-name" placeholder="品名">
                <input type="number" id="new-p-price" placeholder="價格">
                <button class="btn-add" onclick="POS.addItem()">新增</button>
            </div>
            <div id="item-manager-list"></div>
        </div>
    </div>

    <script>
        const POS = {
            config: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                authDomain: "lemontea-ad44d.firebaseapp.com",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main", 
            inv: [], cart: [], staffList: [], sales: [], currentStaff: null,

            init() {
                firebase.initializeApp(this.config);
                this.startSync();
            },

            startSync() {
                const db = firebase.database();
                const today = new Date().toISOString().split('T')[0];

                // 同步員工並檢查是否為空
                db.ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staffList = s.val() || [{name: "老闆", code: "8888"}, {name: "員工", code: "0001"}];
                    if(!s.val()) db.ref(`stores/${this.storeID}/staff`).set(this.staffList);
                    this.renderAdminStaff();
                });

                // 同步品項
                db.ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [{cat: "熱門飲品", items: [{n:"泰式奶茶", p:60, id:1}]}];
                    if(!s.val()) db.ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    this.renderGrid();
                    this.renderAdminItems();
                });

                // 同步銷售
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = s.val() ? Object.values(s.val()) : [];
                    this.updateRevenueUI();
                });
            },

            staffLogin() {
                const code = document.getElementById("staff-code").value;
                const found = this.staffList.find(s => s.code === code);
                if (found) {
                    this.currentStaff = found;
                    document.getElementById("current-staff-name").innerText = "👤 員工: " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("代碼錯誤！目前可用 8888 或 0001"); }
            },

            renderGrid() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    const btn = document.createElement("button");
                    btn.className = "nav-btn" + (ci === 0 ? " active" : "");
                    btn.innerText = c.cat;
                    btn.onclick = (e) => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(`c-${ci}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                    tabs.appendChild(btn);
                    let h = `<div id="c-${ci}"><div class="category-title">${c.cat}</div><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({ n, p, id: Date.now() + Math.random() });
                this.updateCartUI();
            },

            updateCartUI() {
                const list = document.getElementById("cart-list-ui");
                list.innerHTML = "";
                let total = 0;
                this.cart.forEach(item => {
                    total += item.p;
                    const tag = document.createElement("div");
                    tag.className = "cart-item-tag";
                    tag.innerText = item.n;
                    tag.onclick = () => { this.cart = this.cart.filter(i => i.id !== item.id); this.updateCartUI(); };
                    list.appendChild(tag);
                });
                document.getElementById("total-val").innerText = total;
                document.getElementById("cart-count").innerText = this.cart.length;
            },

            doCheckout() {
                if (this.cart.length === 0) return;
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                const db = firebase.database();
                this.cart.forEach(item => {
                    db.ref(`stores/${this.storeID}/sales/${today}`).push({ t: time, s: this.currentStaff.name, n: item.n, p: item.p });
                });
                alert("結帳成功！");
                this.cart = [];
                this.updateCartUI();
            },

            updateRevenueUI() {
                const sum = this.sales.reduce((a, b) => a + b.p, 0);
                const count = this.sales.length;
                document.getElementById("st-sum").innerText = sum;
                document.getElementById("st-count").innerText = count;
                document.getElementById("ad-sum").innerText = "$" + sum;
                document.getElementById("ad-count").innerText = count;
            },

            openAdmin() {
                const pw = prompt("管理密碼");
                if (pw === "8888") {
                    document.getElementById("admin-screen").style.display = "block";
                    document.getElementById("boss-revenue-tag").style.display = "block";
                }
            },

            exportCSV() {
                const today = new Date().toISOString().split('T')[0];
                let csv = "\uFEFF時間,員工,品項,金額\n";
                this.sales.forEach(s => csv += `${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `小森檸報表_${this.storeID}_${today}.csv`;
                link.click();
            },

            renderAdminStaff() {
                const list = document.getElementById("staff-manager-list");
                list.innerHTML = "";
                this.staffList.forEach((s, i) => {
                    list.innerHTML += `<div class="list-item"><span>${s.name} (${s.code})</span><button onclick="POS.delStaff(${i})" style="color:red;border:none;background:none;">刪除</button></div>`;
                });
            },
            addStaff() {
                const n = document.getElementById("new-staff-name").value;
                const c = document.getElementById("new-staff-code").value;
                if(!n || !c) return;
                this.staffList.push({name:n, code:c});
                firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staffList);
            },
            delStaff(i) { this.staffList.splice(i, 1); firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staffList); },

            renderAdminItems() {
                const list = document.getElementById("item-manager-list");
                list.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    (c.items || []).forEach((it, ii) => {
                        list.innerHTML += `<div class="list-item"><span>[${c.cat}] ${it.n} $${it.p}</span><button onclick="POS.delItem(${ci}, ${ii})" style="color:red;border:none;background:none;">刪除</button></div>`;
                    });
                });
            },
            addItem() {
                const cat = document.getElementById("new-p-cat").value;
                const n = document.getElementById("new-p-name").value;
                const p = parseInt(document.getElementById("new-p-price").value);
                if(!cat || !n || !p) return;
                let target = this.inv.find(c => c.cat === cat);
                if(!target) { target = {cat: cat, items: []}; this.inv.push(target); }
                target.items.push({n, p, id: Date.now()});
                firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
            },
            delItem(ci, ii) {
                this.inv[ci].items.splice(ii, 1);
                if(this.inv[ci].items.length === 0) this.inv.splice(ci, 1);
                firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
