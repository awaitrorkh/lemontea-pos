<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 旗艦管理版</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 員工登入頁面 */
        #staff-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; padding: 40px 30px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-card input { font-size: 32px; text-align: center; letter-spacing: 10px; width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin: 20px 0; outline: none; }

        /* POS 主介面 */
        header { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 250px; }
        .cat-section { margin-bottom: 25px; }
        .cat-name { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #444; border-left: 5px solid var(--p); padding-left: 10px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { background: #fff; padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; height: 90px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.1s; }
        .p-card:active { transform: scale(0.95); background: #f9f9f9; }
        .p-card b { font-size: 14px; margin-bottom: 5px; color: #333; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .p-card span { color: var(--p); font-weight: 800; font-size: 15px; }

        /* 購物車與底部欄 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px 15px 25px; border-top: 1px solid #ddd; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .cart-list { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; height: 45px; align-items: center; }
        .cart-tag { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; padding: 6px 14px; border-radius: 10px; white-space: nowrap; font-size: 13px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; height: 65px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 15px; flex: 2; font-size: 22px; font-weight: bold; }
        .btn-tool { background: #f8f9fa; border: 1px solid #ddd; border-radius: 15px; width: 65px; font-size: 26px; }

        /* 計算機彈窗 */
        #checkout-screen { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; z-index: 2000; display: none; flex-direction: column; padding: 25px; border-radius: 30px 30px 0 0; color: white; }
        .calc-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 18px; border-radius: 20px; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .n-btn { background: #445566; border: none; color: white; font-size: 26px; border-radius: 15px; height: 65px; font-weight: bold; }
        .n-btn.action { background: var(--s); }
        .n-btn.confirm { background: var(--p); grid-column: span 2; }

        /* 管理後台面板 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; overflow-y: auto; padding: 20px; }
        .admin-box { background: #f8f9fa; padding: 18px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #eee; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        input, select { padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 員工登入 -->
    <div id="staff-login">
        <div class="login-card">
            <h2 style="color:var(--p); margin-bottom:10px;">小森檸 POS</h2>
            <p style="font-size:14px; color:#999;">請輸入員工代碼</p>
            <input type="password" id="staff-input" placeholder="----" maxlength="4" inputmode="numeric">
            <button onclick="POS.login()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--p); color:white; font-size:18px; font-weight:bold;">進入系統</button>
        </div>
    </div>

    <!-- POS 主畫面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <span id="user-display">👤 讀取中...</span>
            <span>小森檸 ＆ 泰奶</span>
        </header>
        
        <div id="main-grid"></div>

        <div class="cart-bar">
            <div class="cart-list" id="cart-ui"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span style="color:#666">共選 <b id="cart-num" style="color:#333; font-size:20px;">0</b> 杯</span>
                <span style="font-size:32px; font-weight:900; color:var(--s)">$<span id="cart-total">0</span></span>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCalc()">結帳找零</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 結帳計算機面板 -->
    <div id="checkout-screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
            <b style="font-size:22px;">收銀找零計算</b>
            <span onclick="POS.closeCalc()" style="font-size:30px; padding:5px;">✕</span>
        </div>
        
        <div class="calc-display">
            <div>
                <p style="font-size:13px; opacity:0.8">應收金額</p>
                <h2 style="font-size:30px;" id="calc-need">$0</h2>
            </div>
            <div style="text-align:right;">
                <p style="font-size:13px; opacity:0.8">實收金額</p>
                <h2 id="calc-in" style="font-size:36px; color:#52c41a;">0</h2>
            </div>
        </div>

        <div style="background:var(--s); padding:12px; border-radius:15px; text-align:center; margin-bottom:25px;">
            <span style="font-size:18px;">找零金額：</span>
            <b style="font-size:32px;">$<span id="calc-change">0</span></b>
        </div>

        <div class="num-grid">
            <button class="n-btn" onclick="POS.press('7')">7</button><button class="n-btn" onclick="POS.press('8')">8</button><button class="n-btn" onclick="POS.press('9')">9</button><button class="n-btn action" onclick="POS.press('C')">C</button>
            <button class="n-btn" onclick="POS.press('4')">4</button><button class="n-btn" onclick="POS.press('5')">5</button><button class="n-btn" onclick="POS.press('6')">6</button><button class="n-btn action" onclick="POS.press('00')">00</button>
            <button class="n-btn" onclick="POS.press('1')">1</button><button class="n-btn" onclick="POS.press('2')">2</button><button class="n-btn" onclick="POS.press('3')">3</button><button class="n-btn" onclick="POS.press('0')">0</button>
            <button class="n-btn confirm" onclick="POS.submitPay()">確認結帳</button>
            <button class="n-btn action" style="grid-column: span 2; background:#555;" onclick="POS.closeCalc()">取消離開</button>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:#333">數據與菜單管理</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="border:none; background:#eee; padding:10px 20px; border-radius:12px; font-weight:bold;">✕ 關閉後台</button>
        </div>

        <!-- 營收數據 (僅後台顯示) -->
        <div class="admin-box" style="background:var(--p); color:white; text-align:center;">
            <p style="opacity:0.9">今日營業總額</p>
            <h1 id="ad-sum" style="font-size:45px; margin:10px 0;">$0</h1>
            <h3 id="ad-count" style="font-weight:normal; opacity:0.9;">累計銷售：0 杯</h3>
        </div>

        <!-- 大類管理 -->
        <div class="admin-box">
            <h3 style="margin-bottom:10px;">1. 類別管理 (新增/刪除大類)</h3>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input type="text" id="new-cat" placeholder="例如：奶茶類" style="flex:1">
                <button onclick="POS.addCat()" style="padding:0 20px; background:var(--p); color:white; border:none; border-radius:10px; font-weight:bold;">新增大類</button>
            </div>
            <div id="admin-cat-list"></div>
        </div>

        <!-- 品項管理 -->
        <div class="admin-box">
            <h3 style="margin-bottom:10px;">2. 品項管理 (新增/刪除飲料)</h3>
            <select id="cat-select" style="width:100%; margin-bottom:10px;"><option value="">-- 請選擇大類 --</option></select>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input type="text" id="new-it-n" placeholder="飲料名稱" style="flex:2">
                <input type="number" id="new-it-p" placeholder="單價" style="flex:1">
                <button onclick="POS.addItem()" style="padding:0 20px; background:var(--p); color:white; border:none; border-radius:10px; font-weight:bold;">新增品項</button>
            </div>
            <div id="admin-item-list" style="max-height: 300px; overflow-y: auto;"></div>
        </div>
        
        <button onclick="POS.exportCSV()" style="width:100%; padding:20px; background:var(--s); color:white; border:none; border-radius:18px; font-weight:bold; font-size:18px;">📊 匯出今日銷售報表 (CSV)</button>
    </div>

    <script>
        const POS = {
            // Firebase 配置 (與之前相同)
            dbCfg: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main",
            staff: [], inv: [], cart: [], sales: [], user: null, inStr: "0",

            init() {
                firebase.initializeApp(this.dbCfg);
                const db = firebase.database();
                
                // 讀取員工
                db.ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staff = s.val() || [{name:"店長", code:"8888"}];
                });

                // 讀取菜單
                db.ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [];
                    this.renderGrid();
                    this.renderAdminLists();
                });

                // 讀取營收
                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = s.val() ? Object.values(s.val()) : [];
                    const sum = this.sales.reduce((a, b) => a + b.p, 0);
                    document.getElementById("ad-sum").innerText = "$" + sum;
                    document.getElementById("ad-count").innerText = `累計銷售：${this.sales.length} 杯`;
                });
            },

            login() {
                const code = document.getElementById("staff-input").value;
                const found = this.staff.find(s => s.code == code);
                if(found) {
                    this.user = found;
                    document.getElementById("user-display").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("員工代碼錯誤！"); }
            },

            renderGrid() {
                const grid = document.getElementById("main-grid"); grid.innerHTML = "";
                if(this.inv.length === 0) { grid.innerHTML = "<p style='text-align:center; color:#999; margin-top:50px;'>尚未建立菜單，請進入後台設定</p>"; return; }
                
                this.inv.forEach(c => {
                    let h = `<div class="cat-section"><div class="cat-name">${c.cat}</div><div class="items-flex">`;
                    if(c.items) {
                        c.items.forEach(it => {
                            h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`;
                        });
                    }
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({ n, p, id: Date.now() });
                this.updateCartUI();
            },

            updateCartUI() {
                const ui = document.getElementById("cart-ui"); ui.innerHTML = "";
                let total = 0;
                this.cart.forEach(it => {
                    total += it.p;
                    const tag = document.createElement("div"); tag.className = "cart-tag";
                    tag.innerText = it.n;
                    tag.onclick = () => { this.cart = this.cart.filter(x => x.id != it.id); this.updateCartUI(); };
                    ui.appendChild(tag);
                });
                document.getElementById("cart-total").innerText = total;
                document.getElementById("cart-num").innerText = this.cart.length;
                ui.scrollLeft = ui.scrollWidth;
            },

            openCalc() {
                const total = document.getElementById("cart-total").innerText;
                if(total == "0") return;
                this.inStr = "0";
                document.getElementById("calc-in").innerText = "0";
                document.getElementById("calc-change").innerText = "0";
                document.getElementById("calc-need").innerText = "$" + total;
                document.getElementById("checkout-screen").style.display = "flex";
            },

            closeCalc() { document.getElementById("checkout-screen").style.display = "none"; },

            press(v) {
                if(v === 'C') this.inStr = "0";
                else if(this.inStr === "0") this.inStr = v;
                else this.inStr += v;
                this.refreshCalc();
            },

            refreshCalc() {
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const input = parseInt(this.inStr);
                document.getElementById("calc-in").innerText = this.inStr;
                const change = input - need;
                document.getElementById("calc-change").innerText = change > 0 ? change : 0;
            },

            submitPay() {
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const cash = parseInt(this.inStr);
                if(cash < need) return alert("實收金額不足！");
                
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                const db = firebase.database();
                
                this.cart.forEach(it => {
                    db.ref(`stores/${this.storeID}/sales/${today}`).push({
                        t: time, s: this.user.name, n: it.n, p: it.p
                    });
                });
                
                alert("結帳完成！找零：$" + (cash - need));
                this.cart = []; this.updateCartUI(); this.closeCalc();
            },

            openAdmin() { if(prompt("請輸入管理密碼")==="8888") document.getElementById("admin-screen").style.display="block"; },

            // 管理功能
            renderAdminLists() {
                const catSel = document.getElementById("cat-select");
                const catList = document.getElementById("admin-cat-list");
                const itemList = document.getElementById("admin-item-list");
                
                catSel.innerHTML = '<option value="">-- 選擇大類 --</option>';
                catList.innerHTML = ""; itemList.innerHTML = "";

                this.inv.forEach((c, cIdx) => {
                    catSel.innerHTML += `<option value="${cIdx}">${c.cat}</option>`;
                    catList.innerHTML += `<div class="list-item"><span><b>${c.cat}</b> (${c.items ? c.items.length : 0} 品項)</span><button class="del-btn" onclick="POS.delCat(${cIdx})">刪除類別</button></div>`;

                    if(c.items) {
                        c.items.forEach((it, itIdx) => {
                            itemList.innerHTML += `<div class="list-item"><span>[${c.cat}] ${it.n} - $${it.p}</span><button class="del-btn" onclick="POS.delItem(${cIdx}, ${itIdx})">刪除</button></div>`;
                        });
                    }
                });
            },

            addCat() {
                const name = document.getElementById("new-cat").value;
                if(name) {
                    this.inv.push({ cat: name, items: [] });
                    this.saveInv();
                    document.getElementById("new-cat").value = "";
                }
            },

            delCat(idx) {
                if(confirm("確定要刪除整個類別嗎？這會連同裡面的飲料一併刪除喔！")) {
                    this.inv.splice(idx, 1);
                    this.saveInv();
                }
            },

            addItem() {
                const idx = document.getElementById("cat-select").value;
                const n = document.getElementById("new-it-n").value;
                const p = parseInt(document.getElementById("new-it-p").value);
                if(idx !== "" && n && p) {
                    if(!this.inv[idx].items) this.inv[idx].items = [];
                    this.inv[idx].items.push({ n, p });
                    this.saveInv();
                    document.getElementById("new-it-n").value = "";
                    document.getElementById("new-it-p").value = "";
                } else { alert("請完整填寫類別、品名與價格！"); }
            },

            delItem(cIdx, itIdx) {
                if(confirm("確定刪除此品項？")) {
                    this.inv[cIdx].items.splice(itIdx, 1);
                    this.saveInv();
                }
            },

            saveInv() { firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv); },

            exportCSV() {
                let csv = "\uFEFF交易時間,結帳員工,品項名稱,銷售金額\n";
                this.sales.forEach(s => csv += `${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `小森檸報表_${new Date().toLocaleDateString()}.csv`;
                link.click();
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
