<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小森檸 POS - 完整功能修正版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f8faf9; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
            background: var(--bg); font-family: -apple-system, "Noto Sans TC", sans-serif;
            display: flex; flex-direction: column;
        }

        header { 
            background: var(--p); color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }

        #main-grid { 
            flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 220px; 
            -webkit-overflow-scrolling: touch; 
        }

        .cat-section { margin-bottom: 20px; }
        .cat-name { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #666; border-left: 4px solid var(--p); padding-left: 8px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        .p-card { 
            background: #fff; padding: 10px 4px; border-radius: 12px; text-align: center; 
            border: 1px solid rgba(0,0,0,0.05); min-height: 80px; 
            display: flex; flex-direction: column; justify-content: center; 
        }

        .cart-bar { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #eee; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.04); 
        }

        /* 計算機與管理後台的全螢幕樣式 */
        #staff-login, #checkout-screen, #admin-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
        }
        #admin-screen { 
            display: none; overflow-y: auto; padding: 20px; 
            padding-top: calc(20px + env(safe-area-inset-top)); 
        }

        .admin-box { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .del-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; }
        
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 4px 0; font-size: 14px; }
        .btn-group { display: flex; gap: 8px; height: 52px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 12px; flex: 1.5; font-size: 18px; font-weight: bold; }
        .btn-tool { background: #f0f2f5; border: none; border-radius: 12px; width: 52px; font-size: 20px; color: #555; }
    </style>
</head>
<body>

    <!-- 員工登入 (保持原有) -->
    <div id="staff-login">
        <div style="padding: 30px; text-align: center; margin-top: 100px;">
            <h2 style="color:var(--p)">小森檸 POS</h2>
            <input type="password" id="staff-input" placeholder="代碼" maxlength="4" inputmode="numeric" style="font-size:28px; text-align:center; width:200px; margin:20px 0;">
            <button onclick="POS.login()" style="width:200px; padding:15px; background:var(--p); color:white; border-radius:12px; border:none;">進入系統</button>
        </div>
    </div>

    <!-- POS 主畫面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100%;">
        <header>
            <span id="user-display">👤 載入中</span>
            <span>Little Forest POS</span>
        </header>
        <div id="main-grid"></div>
        <div class="cart-bar">
            <div class="cart-list" id="cart-ui" style="display:flex; gap:5px; overflow-x:auto; margin-bottom:10px;"></div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;">
                <span style="font-size:13px; color:#888;">已選 <b id="cart-num" style="color:var(--p)">0</b> 杯</span>
                <span style="font-size:28px; font-weight:900; color:var(--s)">$<span id="cart-total">0</span></span>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCalc()">結帳找零</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 管理後台：修正重點區塊 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="color:#333;">店鋪營運管理</h3>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="border:none; background:#eee; padding:8px 15px; border-radius:8px;">✕ 關閉</button>
        </div>

        <!-- 1. 營業報表 (補回日期統計與 CSV) -->
        <div class="admin-box" style="background:var(--p); color:white;">
            <p style="font-size:13px; margin-bottom:10px;">營收區間查詢</p>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
                <input type="date" id="date-start" style="flex:1;">
                <input type="date" id="date-end" style="flex:1;">
            </div>
            <button onclick="POS.querySalesRange()" style="width:100%; padding:10px; background:rgba(0,0,0,0.2); color:white; border:none; border-radius:8px; margin-bottom:15px;">🔍 查詢統計數據</button>
            
            <div style="text-align:center;">
                <h1 id="ad-sum" style="font-size:36px;">$0</h1>
                <p id="ad-count" style="font-size:13px; opacity:0.8;">累計杯數：0 杯</p>
            </div>
            
            <button onclick="POS.exportCSVRange()" style="width:100%; padding:14px; background:var(--s); color:white; border:none; border-radius:12px; font-weight:bold; margin-top:15px;">📊 導出此區間 CSV 報表</button>
        </div>

        <!-- 2. 員工管理 (補回新增/刪除按鈕) -->
        <div class="admin-box">
            <p style="font-weight:bold; margin-bottom:8px;">員工名單管理</p>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="new-staff-n" placeholder="姓名" style="flex:1.5">
                <input type="number" id="new-staff-c" placeholder="4位代碼" maxlength="4" style="flex:1" inputmode="numeric">
                <button onclick="POS.addStaff()" style="padding:0 15px; background:var(--p); color:white; border:none; border-radius:8px;">新增</button>
            </div>
            <div id="admin-staff-list" style="max-height:150px; overflow-y:auto;">
                <!-- 員工列表會渲染在這裡 -->
            </div>
        </div>

        <!-- 3. 商品類別與品項管理 (保持原有功能) -->
        <div class="admin-box">
            <p style="font-weight:bold; margin-bottom:8px;">商品管理</p>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="new-cat" placeholder="新類別名稱" style="flex:1">
                <button onclick="POS.addCat()" style="padding:0 15px; background:var(--p); color:white; border:none; border-radius:8px;">新增類別</button>
            </div>
            <select id="cat-select" style="margin-bottom:10px;"><option value="">-- 先選類別 --</option></select>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-it-n" placeholder="品名" style="flex:2">
                <input type="number" id="new-it-p" placeholder="價格" style="flex:1">
                <button onclick="POS.addItem()" style="padding:0 15px; background:var(--p); color:white; border:none; border-radius:8px;">新增品項</button>
            </div>
            <div id="admin-item-list" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <!-- 結帳計算器 (略) -->
    <div id="checkout-screen" style="display:none;">
        <!-- ...計算器代碼 (保持之前提供的內容) ... -->
    </div>

    <script>
        const POS = {
            dbCfg: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main",
            staff: [], inv: [], cart: [], sales: [], user: null, inStr: "0",

            init() {
                firebase.initializeApp(this.dbCfg);
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date-start').value = today;
                document.getElementById('date-end').value = today;

                // 員工監聽
                firebase.database().ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staff = s.val() || [{name:"店長", code:"8888"}];
                    this.renderStaffList();
                });

                // 庫存監聽
                firebase.database().ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [];
                    this.renderGrid();
                    this.renderAdminLists();
                });

                this.querySalesRange();
            },

            // --- 補回：員工管理邏輯 ---
            addStaff() {
                const n = document.getElementById("new-staff-n").value;
                const c = document.getElementById("new-staff-c").value;
                if(n && c.length === 4) {
                    this.staff.push({ name: n, code: c });
                    this.saveStaff();
                    document.getElementById("new-staff-n").value = "";
                    document.getElementById("new-staff-c").value = "";
                } else { alert("請輸入姓名與4位代碼"); }
            },
            delStaff(idx) {
                if(confirm("確定刪除此員工？")) { this.staff.splice(idx, 1); this.saveStaff(); }
            },
            saveStaff() { firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staff); },
            renderStaffList() {
                const list = document.getElementById("admin-staff-list");
                list.innerHTML = "";
                this.staff.forEach((s, idx) => {
                    list.innerHTML += `<div class="list-item"><span>${s.name} (${s.code})</span><button class="del-btn" onclick="POS.delStaff(${idx})">刪除</button></div>`;
                });
            },

            // --- 補回：報表查詢與 CSV 邏輯 ---
            querySalesRange() {
                const start = document.getElementById('date-start').value;
                const end = document.getElementById('date-end').value;
                firebase.database().ref(`stores/${this.storeID}/sales`).once("value", s => {
                    const allDays = s.val() || {};
                    let rangeSales = [];
                    Object.keys(allDays).sort().forEach(date => {
                        if (date >= start && date <= end) {
                            Object.values(allDays[date]).forEach(item => rangeSales.push({ ...item, date }));
                        }
                    });
                    this.sales = rangeSales;
                    const sum = this.sales.reduce((a, b) => a + b.p, 0);
                    document.getElementById("ad-sum").innerText = "$" + sum;
                    document.getElementById("ad-count").innerText = `累計杯數：${this.sales.length} 杯`;
                });
            },
            exportCSVRange() {
                if(this.sales.length === 0) return alert("目前區間無數據");
                let csv = "\uFEFF日期,時間,店員,品項,金額\n";
                this.sales.forEach(s => csv += `${s.date},${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `小森檸報表_${document.getElementById('date-start').value}_${document.getElementById('date-end').value}.csv`;
                link.click();
            },

            // --- 基礎 POS 邏輯 (登入、選單渲染等) ---
            login() {
                const code = document.getElementById("staff-input").value;
                const found = this.staff.find(s => s.code == code);
                if(found) {
                    this.user = found;
                    document.getElementById("user-display").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("代碼錯誤"); }
            },
            renderGrid() { /* 品項渲染邏輯與之前一致 */ },
            addCart(n, p) { /* 購物車邏輯與之前一致 */ },
            updateCartUI() { /* 購物車 UI 邏輯與之前一致 */ },
            openCalc() { /* 結帳顯示邏輯與之前一致 */ },
            openAdmin() { if(prompt("管理密碼")==="8888") document.getElementById("admin-screen").style.display="block"; },
            
            // 商品管理邏輯
            renderAdminLists() {
                const catSel = document.getElementById("cat-select");
                const itemList = document.getElementById("admin-item-list");
                catSel.innerHTML = '<option value="">-- 先選類別 --</option>';
                itemList.innerHTML = "";
                this.inv.forEach((c, cIdx) => {
                    catSel.innerHTML += `<option value="${cIdx}">${c.cat}</option>`;
                    if(c.items) {
                        c.items.forEach((it, itIdx) => {
                            itemList.innerHTML += `<div class="list-item"><span>[${c.cat}] ${it.n}</span><button class="del-btn" onclick="POS.delItem(${cIdx}, ${itIdx})">刪除</button></div>`;
                        });
                    }
                });
            },
            addCat() { /* 新增類別邏輯 */ },
            addItem() { /* 新增品項邏輯 */ },
            delItem(cIdx, itIdx) { if(confirm("確定刪除？")) { this.inv[cIdx].items.splice(itIdx, 1); this.saveInv(); } },
            saveInv() { firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv); }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
