<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS 終極修復版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* 初始化覆蓋層 */
        #loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 登入介面 */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-green { width: 100%; padding: 14px; background: var(--p); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* POS 主架構 */
        #pos-screen { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px; background: #fff; border-bottom: 1px solid #eee; }
        .nav-btn { padding: 8px 16px; background: #f0f0f0; border: none; border-radius: 20px; white-space: nowrap; font-size: 14px; }
        
        #main-grid { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 150px; }
        .cat-section h3 { border-left: 5px solid var(--p); padding-left: 12px; margin: 20px 0 10px; }
        .items-flex { display: flex; flex-wrap: wrap; gap: 10px; }
        .p-card { 
            width: calc(33.33% - 7px); min-height: 95px; background: #fff; padding: 10px 5px; 
            border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); text-align: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box;
        }
        .p-card b { font-size: 13px; word-break: break-all; -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

        /* 底部購物車 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; padding: 12px; box-sizing: border-box; }
        
        /* 管理後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 9000; display: none; padding: 20px; overflow-y: auto; }
        .admin-table-wrap { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        table { width: 100%; font-size: 14px; border-collapse: collapse; background: white; }
        td, th { padding: 8px; border: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 style="color:var(--p)">系統啟動中...</h2>
        <p id="status-text">正在連接伺服器...</p>
        <button id="retry-btn" style="display:none; margin-top:20px;" onclick="location.reload()">重新整理</button>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--p)">小森檸 POS</h1>
            <input type="text" id="acc" placeholder="帳號 (Email)">
            <input type="password" id="pw" placeholder="密碼">
            <button onclick="doLogin()" class="btn-green">進入系統</button>
            <p id="login-msg" style="color:red; font-size:12px;"></p>
        </div>
    </div>

    <div id="pos-screen">
        <div class="nav-bar"
