<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 終極穩定版</title>
    
    <script>
        // --- 核心資料存取 ---
        const POS = {
            inv: JSON.parse(localStorage.getItem('myPOS_inv') || '[]'),
            sales: JSON.parse(localStorage.getItem('myPOS_sales') || '[]'),
            cart: [],

            init() {
                this.updateStats();
                this.renderPOS();
                console.log("系統已啟動");
            },

            saveInv() { localStorage.setItem('myPOS_inv', JSON.stringify(this.inv)); },
            saveSales() { localStorage.setItem('myPOS_sales', JSON.stringify(this.sales)); },

            renderPOS() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                if (this.inv.length === 0) {
                    grid.innerHTML = "<div style='text-align:center; padding:50px; color:#999;'>請進入「管理」新增菜單</div>";
                    return;
                }
                this.inv.forEach((c, ci) => {
                    tabs.innerHTML += `<button class="nav-btn" onclick="document.getElementById('c-${ci}').scrollIntoView({behavior:'smooth'})">${c.cat}</button>`;
                    let h = `<div id="c-${ci}" class="cat-section"><h3>${c.cat}</h3><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.id}')"><b>${it.n}</b><span style="color:#27ae60;font-weight:bold;">$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(id) {
                this.inv.forEach(c => (c.items || []).forEach(it => {
                    if(it.id == id) { this.cart.push({...it}); this.updateCartUI(); }
                }));
            },

            updateCartUI() {
                let total = 0;
                const detail = document.getElementById("cart-detail");
                detail.innerHTML = "";
                this.cart.forEach((it, idx) => {
                    total += it.p;
                    detail.innerHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f9f9f9;">
                        <span>${it.n} ($${it.p})</span>
                        <button onclick="POS.cart.splice(${idx},1);POS.updateCartUI()" style="color:red;border:none;background:none;">✕</button>
                    </div>`;
                });
                document.getElementById("cart-count").innerText = this.cart.length;
                document.getElementById("total-val").innerText = total;
            },

            checkout() {
                if(this.cart.length === 0) return alert("購物車是空的");
                const now = new Date();
                const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
                this.cart.forEach(item => this.sales.push({ time: timeStr, n: item.n, p: item.p }));
                this.saveSales();
                this.updateStats();
                alert("結帳成功！");
                this.cart = [];
                this.updateCartUI();
                document.getElementById("cart-detail").style.display = 'none';
            },

            updateStats() {
                let sum = 0;
                this.sales.forEach(s => sum += s.p);
                document.getElementById("today-count").innerText = this.sales.length;
                document.getElementById("today-sum").innerText = "$" + sum;
            },

            exportCSV() {
                if(this.sales.length === 0) return alert("目前沒有銷售資料可匯出");
                let csv = "\uFEFF時間,品項,金額\n";
                this.sales.forEach(s => csv += `${s.time},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `小森檸報表_${new Date().toLocaleDateString()}.csv`;
                link.click();
            }
        };

        // 管理介面專用功能
        function openAdmin() { if(prompt("管理密碼") === "8888") document.getElementById("admin-screen").style.display = "block"; renderEditor(); }
        function closeAdmin() { document.getElementById("admin-screen").style.display = "none"; POS.renderPOS(); }
        function addCat() { const n = prompt("分類名"); if(n){ POS.inv.push({cat:n, items:[]}); POS.saveInv(); renderEditor(); } }
        function renderEditor() {
            const box = document.getElementById("editor");
            let h = "";
            POS.inv.forEach((c, ci) => {
                h += `<div style="background:#f9f9f9;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ddd;">
                    <input type="text" value="${c.cat}" onchange="POS.inv[${ci}].cat=this.value;POS.saveInv()" style="width:60%;">
                    <button onclick="POS.inv.splice(${ci},1);POS.saveInv();renderEditor()" style="color:red;float:right;">刪除分類</button>
                    <div style="margin-top:10px;">`;
                (c.items || []).forEach((it, ii) => {
                    h += `<div style="margin-bottom:5px;">
                        <input type="text" value="${it.n}" style="width:100px;" onchange="POS.inv[${ci}].items[${ii}].n=this.value;POS.saveInv()">
                        <input type="number" value="${it.p}" style="width:50px;" onchange="POS.inv[${ci}].items[${ii}].p=Number(this.value);POS.saveInv()">
                        <button onclick="POS.inv[${ci}].items.splice(${ii},1);POS.saveInv();renderEditor()">✕</button>
                    </div>`;
                });
                h += `</div><button onclick="POS
