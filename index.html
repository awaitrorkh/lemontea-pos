<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 專業點餐版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --p: #27ae60; --p-dark: #219150; --s: #e67e22; --bg: #f8f9fa; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* 頂部標題 */
        header { background: var(--p); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .revenue-tag { background: rgba(0,0,0,0.15); padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; display: none; }

        /* 分類 */
        .nav-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: #fff; border-bottom: 1px solid #eee; }
        .nav-btn { padding: 8px 18px; background: #f0f0f0; border: none; border-radius: 20px; white-space: nowrap; font-weight: 500; }
        .nav-btn.active { background: var(--p); color: #fff; }

        /* 商品格線 */
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 240px; height: calc(100vh - 120px); }
        .category-title { font-size: 18px; font-weight: bold; margin: 15px 0 10px 5px; padding-left: 8px; border-left: 5px solid var(--p); }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { background: #fff; padding: 12px 5px; border-radius: 16px; text-align: center; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 3px 6px rgba(0,0,0,0.02); height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .p-card:active { transform: scale(0.95); background: #f0fcf5; }
        .p-card b { font-size: 15px; margin-bottom: 5px; }
        .p-card span { font-size: 13px; color: var(--p); font-weight: bold; }

        /* 下方工具欄 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 12px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        
        /* 刪減按鈕樣式 */
        .cart-list-wrapper { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 5px; }
        .cart-item-tag { background: #fff1f0; color: #f5222d; border: 1px solid #ffa39e; padding: 4px 12px; border-radius: 8px; font-size: 13px; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
        .cart-item-tag::after { content: '✕'; font-weight: bold; font-size: 10px; background: #f5222d; color: white; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }

        .cart-summary { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        
        /* 彈窗與按鈕 */
        .btn-main { background: var(--p); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 600; width: 100%; font-size: 18px; }
        .btn-side { background: #f0f0f0; border: none; border-radius: 12px; width: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .btn-logout { background: #f0f0f0; border: none; border-radius: 12px; padding: 0 15px; font-size: 14px; color: #666; font-weight: 500; }
        
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 9500; display: none; padding: 25px; overflow-y: auto; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .login-card { background: #fff; padding: 30px; border-radius: 24px; width: 100%; max-width: 360px; text-align: center; }
    </style>
</head>
<body>

    <div id="boot-screen" style="position:fixed;inset:0;background:#fff;z-index:10000;display:flex;align-items:center;justify-content:center;">系統載入中...</div>

    <!-- 1. 分店登入 (省略部分 UI 與之前一致) -->
    <div id="store-login" style="display:none;" class="login-card">...</div>

    <!-- 2. 員工代碼 -->
    <div id="staff-login" style="display:none; position:fixed; inset:0; background:#f8f9fa; z-index:9000; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="login-card" style="box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h2 style="color:var(--p)">員工登入</h2>
            <input type="password" id="staff-code" placeholder="請輸入代碼" style="font-size:32px; text-align:center; letter-spacing:10px; width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin:20px 0;">
            <button class="btn-main" onclick="POS.staffLogin()">進入系統</button>
        </div>
    </div>

    <!-- 3. POS 主介面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <span id="current-staff-name" style="font-weight:600;">...</span>
            <div id="boss-revenue-tag" class="revenue-tag">今日: <span id="st-sum">$0</span> (<span id="st-count">0</span>杯)</div>
        </header>

        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>

        <div class="cart-bar">
            <!-- 修改點：點擊品項即可刪除 -->
            <div class="cart-list-wrapper" id="cart-list-ui"></div>
            
            <div class="cart-summary">
                <span>🛒 數量: <b id="cart-count">0</b></span>
                <span>總計 <b style="color:var(--s); font-size:24px;">$<span id="total-val">0</span></b></span>
            </div>
            
            <div style="display:flex; gap:10px;">
                <button onclick="POS.openCheckout()" style="flex:1;" class="btn-main">確認結帳</button>
                <!-- 修改點：交班按鈕移到這裡 -->
                <button onclick="location.reload()" class="btn-logout">交班</button>
                <button onclick="POS.openAdmin()" class="btn-side">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 4. 管理後台 (省略) -->
    <div id="admin-screen">...</div>

    <!-- 結帳彈窗 (省略) -->
    <div id="checkout-modal" class="modal">...</div>

    <script>
        const POS = {
            config: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                authDomain: "lemontea-ad44d.firebaseapp.com",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d",
                storageBucket: "lemontea-ad44d.appspot.com",
                messagingSenderId: "84807565645",
                appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
            },
            storeID: "", inv: [], sales: [], cart: [], staffList: [], currentStaff: null,

            init() {
                if (!firebase.apps.length) firebase.initializeApp(this.config);
                firebase.auth().onAuthStateChanged(user => {
                    document.getElementById("boot-screen").style.display = "none";
                    if (user) {
                        const email = user.email.toLowerCase();
                        this.storeID = email.split("@")[0].replace(/\./g, "_");
                        this.startSync();
                        document.getElementById("staff-login").style.display = "flex";
                    } else {
                        // 處理登入逻辑...
                    }
                });
            },

            startSync() {
                const db = firebase.database();
                db.ref(`global_menu/inventory`).on("value", s => { this.inv = s.val() || []; this.renderGrid(); });
                db.ref(`stores/${this.storeID}/staff`).on("value", s => { this.staffList = s.val() || [{name: "老闆", code: "888"}]; });
                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = Object.values(s.val() || {});
                    this.updateRevenueUI();
                });
            },

            staffLogin() {
                const code = document.getElementById("staff-code").value;
                const found = this.staffList.find(s => s.code === code);
                if (found) {
                    this.currentStaff = found;
                    document.getElementById("current-staff-name").innerText = "員工: " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("代碼錯誤"); }
            },

            renderGrid() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    const btn = document.createElement("button");
                    btn.className = "nav-btn" + (ci === 0 ? " active" : "");
                    btn.innerText = c.cat;
                    btn.onclick = (e) => {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        document.getElementById(`c-${ci}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                    tabs.appendChild(btn);
                    let h = `<div id="c-${ci}"><div class="category-title">${c.cat}</div><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.id}')"><b>${it.n}</b><span>$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            // 修改點：點擊品項
            addCart(id) {
                this.inv.forEach(c => (c.items || []).forEach(it => {
                    if(it.id == id) { this.cart.push({...it, cartId: Date.now() + Math.random()}); this.updateCartUI(); }
                }));
            },

            // 刪除特定品項
            removeFromCart(cartId) {
                this.cart = this.cart.filter(item => item.cartId !== cartId);
                this.updateCartUI();
            },

            updateCartUI() {
                let t = 0; 
                const cartListUI = document.getElementById("cart-list-ui");
                cartListUI.innerHTML = "";
                
                this.cart.forEach(item => {
                    t += item.p;
                    const tag = document.createElement("div");
                    tag.className = "cart-item-tag";
                    tag.innerText = item.n;
                    tag.onclick = () => this.removeFromCart(item.cartId);
                    cartListUI.appendChild(tag);
                });

                document.getElementById("cart-count").innerText = this.cart.length;
                document.getElementById("total-val").innerText = t;
                if(this.cart.length === 0) cartListUI.innerText = "尚未點餐...";
            },

            openCheckout() { /* 與之前邏輯一致 */ },
            doCheckout() { /* 與之前邏輯一致 */ },
            openAdmin() {
                const pw = prompt("管理密碼");
                if (pw === "8888") {
                    document.getElementById("admin-screen").style.display = "block";
                    document.getElementById("boss-revenue-tag").style.display = "block";
                } else { alert("權限不足"); }
            },
            updateRevenueUI() { /* 與之前邏輯一致 */ }
        };
        window.onload = () => POS.init();
    </script>
</body>
</html>
