<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小森檸 POS - 完整功能版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #62ad72; --s: #d99a4e; --bg: #ffffff; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
            background: var(--bg); font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; 
        }

        header { 
            background: var(--p); color: white; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: env(safe-area-inset-top); flex-shrink: 0;
        }

        #pos-screen { display: flex; flex-direction: column; flex: 1; height: 100%; overflow: hidden; }

        #main-grid { 
            flex: 1; overflow-y: auto; padding: 15px; 
            padding-bottom: 220px;
            -webkit-overflow-scrolling: touch; 
        }

        .cat-section { margin-bottom: 25px; }
        .cat-name { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #555; border-left: 4px solid var(--p); padding-left: 10px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .p-card { 
            background: #fff; padding: 15px 5px; border-radius: 12px; text-align: center; 
            border: 1px solid #f0f0f0; min-height: 95px; 
            display: flex; flex-direction: column; justify-content: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .p-card b { font-size: 14px; color: #333; margin-bottom: 5px; }
        .p-card span { color: var(--p); font-weight: bold; font-size: 15px; }

        /* 底部結帳欄位 */
        .cart-bar { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #eee; z-index: 100;
        }
        .cart-status { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; }
        .total-price { font-size: 34px; font-weight: 800; color: var(--s); }

        .btn-group { display: flex; gap: 10px; height: 60px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 12px; flex: 1; font-size: 20px; font-weight: bold; }
        .btn-tool { background: #f0f2f5; border: none; border-radius: 12px; width: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* 全螢幕覆蓋層 */
        #staff-login, #checkout-screen, #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; }
        #checkout-screen { background: #2c3e50; display: none; flex-direction: column; padding: 20px; color: white; }
        #admin-screen { display: none; overflow-y: auto; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); }

        /* 計算機佈局：標準 7-8-9 在上 */
        .calc-display { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex: 1; }
        .n-btn { background: #445566; border: none; color: white; font-size: 28px; border-radius: 12px; font-weight: bold; min-height: 65px; }
        .n-btn.action { background: var(--s); }
        .n-btn.confirm { background: var(--p); grid-column: span 2; }

        .admin-box { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; color: #333; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 5px 0; font-size: 15px; }
    </style>
</head>
<body>

    <div id="staff-login">
        <div style="padding: 80px 20px; text-align: center;">
            <h2 style="color:var(--p); margin-bottom:30px;">小森檸＆泰奶 POS</h2>
            <input type="password" id="staff-input" placeholder="請輸入4位代碼" maxlength="4" inputmode="numeric" style="font-size:32px; text-align:center; width:220px; border:none; border-bottom:2px solid var(--p);">
            <button onclick="POS.login()" style="width:220px; padding:15px; background:var(--p); color:white; border-radius:12px; border:none; font-size:18px; font-weight:bold; margin-top:30px;">登入系統</button>
        </div>
    </div>

    <div id="pos-screen" style="display:none;">
        <header>
            <span id="user-display">👤 載入中...</span>
            <span style="font-weight:bold;">小森檸POS(W)</span>
        </header>

        <div id="main-grid"></div>

        <div class="cart-bar">
            <div id="cart-tags" style="display:flex; gap:6px; overflow-x:auto; margin-bottom:10px; height:32px;"></div>
            <div class="cart-status">
                <div style="color:#888;">已選 <b id="cart-num" style="color:var(--p)">0</b> 杯</div>
                <div class="total-price">$<span id="cart-total">0</span></div>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCalc()">結帳找零</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <div id="checkout-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:22px;">找零計算</h2>
            <span onclick="POS.closeCalc()" style="font-size:30px; padding:10px;">✕</span>
        </div>
        <div class="calc-display">
            <div style="display:flex; justify-content:space-between; opacity:0.7; font-size:14px;"><span>應收</span><span>實收</span></div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-top:10px;">
                <span id="calc-need" style="font-size:26px;">$0</span>
                <span id="calc-in" style="font-size:42px; color:#52c41a; font-weight:bold;">0</span>
            </div>
        </div>
        <div style="background:var(--s); padding:15px; border-radius:12px; text-align:center; font-size:22px; font-weight:bold; margin-bottom:20px;">
            找零：$<span id="calc-change">0</span>
        </div>
        <div class="num-grid">
            <button class="n-btn" onclick="POS.press('7')">7</button>
            <button class="n-btn" onclick="POS.press('8')">8</button>
            <button class="n-btn" onclick="POS.press('9')">9</button>
            <button class="n-btn action" onclick="POS.press('C')">C</button>
            <button class="n-btn" onclick="POS.press('4')">4</button>
            <button class="n-btn" onclick="POS.press('5')">5</
