<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 找零與快速登出版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        
        /* 啟動與登入 */
        #boot-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #login-screen { display: none; padding: 20px; text-align: center; margin-top: 10vh; }
        .login-card { background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        /* POS 主介面 */
        #pos-screen { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-around; align-items: center; font-size: 14px; position: relative; }
        header b { display: block; font-size: 18px; }
        .logout-link { background: rgba(255,255,255,0.2); color: white; border: none; padding: 5px 12px; border-radius: 5px; font-size: 12px; }
        
        .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { padding: 8px 18px; background: #eee; border: none; border-radius: 20px; white-space: nowrap; font-size: 14px; }
        
        #main-grid { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 160px; }
        .items-flex { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card { width: calc(33.33% - 6px); min-height: 100px; background: #fff; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
        .p-card b { font-size: 13px; line-height: 1.3; margin-bottom: 5px; -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

        /* 購物車 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; padding: 12px; box-sizing: border-box; }
        .btn-main { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 18px; cursor: pointer; }

        /* 找零彈窗 */
        #change-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 85%; max-width: 300px; padding: 20px; border-radius: 15px; text-align: center; }
        .change-res { font-size: 32px; color: #e74c3c; font-weight: bold; margin: 15px 0; }

        /* 管理畫面 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 1000; display: none; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <h2 style="color:var(--p)">小森檸系統啟動中...</h2>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--p)">小森檸 POS</h1>
            <input type="text" id="acc" placeholder="分店帳號 (Email)">
            <input type="password" id="pw" placeholder="密碼">
            <button class="btn-main" onclick="POS.doLogin()">登入系統</button>
        </div>
    </div>

    <div id="pos-screen">
        <header>
            <div>今日杯數<b id="st-count">0</b></div>
            <div>今日營收<b id="st-sum">$0</b></div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <button onclick="POS.exportCSV()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:4px 8px; border-radius:5px; font-size:12px;">匯出報表</button>
                <button onclick="POS.doLogout()" class="logout-link">登出</button>
            </div>
        </header>

        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>

        <div class="cart-bar">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
                <span onclick="const d=document.getElementById('cart-detail'); d.style.display=(d.style.display==='block'?'none':'block')">🛒 已選: <span id="cart-count">0</span> 杯</span>
                <span>總計: $<span id="total-val">0</span></span>
            </div>
            <div id="cart-detail" style="display:none; max-height:150px; overflow-y:auto; border-top:1px solid #eee; margin-bottom:10px;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="POS.openChangeModal()" style="flex:2;" class="btn-main">確認結帳</button>
                <button onclick="POS.openAdmin()" style="flex:1; background:#f0f0f0; border:1px solid #ddd; border-radius:10px; color:#666;">⚙️ 管理</button>
            </div>
        </div>
    </div>

    <!-- 找零彈窗 -->
    <div id="change-modal">
        <div class="modal-content">
            <h3 style="margin:0 0 10px 0;">結帳收款</h3>
            <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-bottom:15px;">
                <div style="color:#666; font-size:13px;">應收總計</div>
                <div style="font-size:24px; font-weight:bold; color:#333;">$<span id="modal-total">0</span></div>
            </div>
            <input type="number" id="cash-in" placeholder="顧客付多少錢？" style="font-size:24px; text-align:center; height:60px; border:2px solid var(--p);" oninput="POS.calcChange()">
            <div style="margin-top:15px; color:#666; font-size:13px;">應找金額</div>
            <div class="change-res" id="change-val">$0</div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="document.getElementById('change-modal').style.display='none'" style="flex:1; padding:15px; border-radius:10px; border:1px solid #ccc; background:#fff;">取消</button>
                <button onclick="POS.checkout()" style="flex:2; padding:15px; border-radius:10px; border:none; background:var(--p); color:white; font-weight:bold; font-size:18px;">完成結帳</button>
            </div>
        </div>
    </div>

    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>店鋪管理</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'" style="padding:10px;">關閉</button>
        </div>
        <button onclick="POS.addCat()" style="width:100%; padding:15px; background:var(--s); color:#fff; border:none; border-radius:10px; margin-bottom:20px; font-weight:bold;">＋ 新增飲品分類</button>
        <div id="editor"></div>
    </div>

    <script>
        const POS = {
            config: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                authDomain: "lemontea-ad44d.firebaseapp.com",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d",
                storageBucket: "lemontea-ad44d.appspot.com",
                messagingSenderId: "84807565645",
                appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
            },
            storeID: "", inv: [], sales: [], cart: [], total: 0,

            init() {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(this.config);
                    firebase.auth().onAuthStateChanged(user => {
                        document.getElementById("boot-screen").style.display = "none";
                        if (user) {
                            this.storeID = user.email.split("@")[0].replace(/\./g, "_");
                            this.showPOS();
                            this.startSync();
                        } else {
                            this.showLogin();
                        }
                    });
                } catch (e) { alert("連線失敗，請檢查網路"); }
            },

            showLogin() { document.getElementById("login-screen").style.display = "block"; document.getElementById("pos-screen").style.display = "none"; },
            showPOS() { document.getElementById("login-screen").style.display = "none"; document.getElementById("pos-screen").style.display = "flex"; },
            doLogin() {
                const a = document.getElementById("acc").value, p = document.getElementById("pw").value;
                if(!a || !p) return alert("請輸入帳號密碼");
                firebase.auth().signInWithEmailAndPassword(a, p).catch(e => alert("帳號或密碼錯誤"));
            },
            doLogout() {
                if(confirm("確定要登出系統嗎？")) {
                    firebase.auth().signOut().then(() => {
                        this.cart = [];
                        this.updateCartUI();
                    });
                }
            },

            startSync() {
                const db = firebase.database();
                db.ref(`stores/${this.storeID}/inventory`).on("value", s => { this.inv = s.val() || []; this.renderGrid(); });
                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => { this.sales = Object.values(s.val() || {}); this.updateStats(); });
            },

            renderGrid() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    tabs.innerHTML += `<button class="nav-btn" onclick="document.getElementById('c-${ci}').scrollIntoView({behavior:'smooth'})">${c.cat}</button>`;
                    let h = `<div id="c-${ci}"><h3>${c.cat}</h3><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.id}')"><b>${it.n}</b><span style="color:var(--p);font-weight:bold;">$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(id) {
                this.inv.forEach(c => (c.items || []).forEach(it => {
                    if(it.id == id) { this.cart.push({...it}); this.updateCartUI(); }
                }));
            },

            updateCartUI() {
                this.total = 0; const d = document.getElementById("cart-detail");
                d.innerHTML = "";
                this.cart.forEach((it, i) => {
                    this.total += it.p;
                    d.innerHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;">
                        <span>${it.n} ($${it.p})</span>
                        <button onclick="POS.cart.splice(${i},1);POS.updateCartUI()" style="color:red;border:none;background:none;">✕</button>
                    </div>`;
                });
                document.getElementById("cart-count").innerText = this.cart.length;
                document.getElementById("total-val").innerText = this.total;
            },

            openChangeModal() {
                if(this.cart.length === 0) return;
                document.getElementById("modal-total").innerText = this.total;
                document.getElementById("cash-in").value = "";
                document.getElementById("change-val").innerText = "$0";
                document.getElementById("change-modal").style.display = "flex";
                setTimeout(() => document.getElementById("cash-in").focus(), 300);
            },

            calcChange() {
                const cash = Number(document.getElementById("cash-in").value) || 0;
                const change = cash - this.total;
                document.getElementById("change-val").innerText = change > 0 ? "$" + change : "$0";
                document.getElementById("change-val").style.color = change >= 0 ? "#e74c3c" : "#999";
            },

            checkout() {
                const cash = Number(document.getElementById("cash-in").value) || 0;
                if (cash < this.total) return alert("收到的金額不足！");

                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                const db = firebase.database();
                this.cart.forEach(it => {
                    db.ref(`stores/${this.storeID}/sales/${today}`).push({ time, n: it.n, p: it.p });
                });
                
                document.getElementById("change-modal").style.display = "none";
                alert(`結帳完成！\n應找金額：$${cash - this.total}`);
                this.cart = []; this.updateCartUI();
                document.getElementById("cart-detail").style.display = 'none';
            },

            updateStats() {
                let sum = 0;
                this.sales.forEach(s => sum += s.p);
                document.getElementById("st-count").innerText = this.sales.length;
                document.getElementById("st-sum").innerText = "$" + sum;
            },

            exportCSV() {
                if(this.sales.length === 0) return alert("今日無資料");
                let csv = "\uFEFF時間,品項,金額\n";
                this.sales.forEach(s => csv += `${s.time},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `小森檸報表_${new Date().toLocaleDateString()}.csv`;
                a.click();
            },

            openAdmin() { if(prompt("管理密碼") === "8888") { document.getElementById("admin-screen").style.display = "block"; this.renderEditor(); } },
            renderEditor() {
                const box = document.getElementById("editor"); h = "";
                this.inv.forEach((c, ci) => {
                    h += `<div style="background:#f9f9f9;padding:10px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;">
                        <input type="text" value="${c.cat}" onchange="POS.inv[${ci}].cat=this.value;POS.saveInv()" style="width:60%;">
                        <button onclick="if(confirm('刪除？')){POS.inv.splice(${ci},1);POS.saveInv();POS.renderEditor()}" style="color:red;float:right;border:none;background:none;">刪除</button>
                        <div style="margin-top:10px;">`;
                    (c.items || []).forEach((it, ii) => {
                        h += `<div style="display:flex;gap:5px;margin-bottom:5px;">
                            <input type="text" value="${it.n}" style="flex:2;" onchange="POS.inv[${ci}].items[${ii}].n=this.value;POS.saveInv()">
                            <input type="number" value="${it.p}" style="flex:1;" onchange="POS.inv[${ci}].items[${ii}].p=Number(this.value);POS.saveInv()">
                            <button onclick="POS.inv[${ci}].items.splice(${ii},1);POS.saveInv();POS.renderEditor()">✕</button>
                        </div>`;
                    });
                    h += `</div><button onclick="POS.inv[${ci}].items.push({id:Date.now(),n:'新飲品',p:50});POS.saveInv();POS.renderEditor()" style="width:100%;margin-top:5px;border:1px dashed #999;background:none;padding:5px;">＋品項</button></div>`;
                });
                box.innerHTML = h;
            },
            saveInv() { firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv); },
            addCat() { const n = prompt("分類名"); if(n){ this.inv.push({cat:n, items:[]}); this.saveInv(); this.renderEditor(); } }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
