<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小森檸 POS - 終極修正版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .login-card { width: 300px; padding: 40px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn-go { width: 100%; padding: 15px; background: #27ae60; color: #fff; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        /* POS 主介面 */
        #pos-screen { display: none; height: 100vh; flex-direction: column; }
        .header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .menu { flex: 1; overflow-y: auto; padding: 20px; }
        .cart { width: 300px; background: white; border-left: 1px solid #ddd; padding: 15px; display: flex; flex-direction: column; }
        
        .p-card { display: inline-block; width: 120px; background: #fff; border: 1px solid #eee; margin: 5px; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }
        .p-card:active { background: #e8f5e9; }
        .cart-list { flex: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; }
        .btn-pay { width: 100%; padding: 20px; background: #e67e22; color: white; border: none; font-size: 20px; font-weight: bold; cursor: pointer; }
        
        /* 後台層 */
        #admin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 8888; display: none; padding: 30px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color:#27ae60">小森檸 POS</h2>
            <div id="check-msg" style="font-size:12px; color:gray; margin-bottom:10px;">系統連線準備中...</div>
            <input type="text" id="u_mail" placeholder="電子郵件">
            <input type="password" id="u_pass" placeholder="密碼">
            <button class="btn-go" onclick="executeLogin()">進入系統</button>
            <p id="err-log" style="color:red; font-size:13px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="pos-screen">
        <div class="header">
            <span><b>小森檸</b> POS 系統</span>
            <button onclick="checkAdmin()" style="cursor:pointer">管理後台</button>
        </div>
        <div class="container">
            <div class="menu" id="menu-box"></div>
            <div class="cart">
                <b>目前訂單</b>
                <div class="cart-list" id="cart-box"></div>
                <div style="font-size: 24px; font-weight: bold; margin-bottom: 15px;">總計: $<span id="total-price">0</span></div>
                <button class="btn-pay" onclick="handleCheckout()">確認結帳</button>
            </div>
        </div>
    </div>

    <div id="admin-screen">
        <div style="float:right"><button onclick="closeAdmin()">關閉離開</button></div>
        <h2>📊 營業數據查詢</h2>
        <hr>
        區間：<input type="date" id="s_date"> ~ <input type="date" id="e_date">
        <button onclick="getReport()" style="padding:5px 15px;">查詢業績</button>
        <button onclick="saveExcel()" style="background:#27ae60; color:white; border:none; padding:5px 15px;">📥 下載 Excel</button>
        <div style="margin-top:20px; display:flex; gap:20px;">
            <div style="padding:20px; background:#f9f9f9; flex:1; border:1px solid #ddd;">銷售總額：<b id="res_m" style="color:red; font-size:24px;">$0</b></div>
            <div style="padding:20px; background:#f9f9f9; flex:1; border:1px solid #ddd;">總杯數：<b id="res_c" style="color:red; font-size:24px;">0 杯</b></div>
        </div>
    </div>

    <script>
        // 1. 初始化與相容性檢查
        var config = {
            apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
            authDomain: "lemontea-ad44d.firebaseapp.com",
            databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
            projectId: "lemontea-ad44d",
            storageBucket: "lemontea-ad44d.appspot.com",
            messagingSenderId: "84807565645",
            appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
        };

        var db, auth, sid = "", inventory = [], cart = [], orders = {};

        window.onload = function() {
            try {
                if (typeof firebase !== "undefined") {
                    firebase.initializeApp(config);
                    db = firebase.database();
                    auth = firebase.auth();
                    document.getElementById("check-msg").innerHTML = "✅ 連線已就緒 (可登入)";
                    document.getElementById("check-msg").style.color = "green";
                } else {
                    document.getElementById("check-msg").innerHTML = "❌ 腳本被封鎖，請檢查廣告阻擋插件";
                }
            } catch (e) {
                alert("啟動失敗: " + e.message);
            }
        };

        // 2. 登入執行 (加上強制 Alert)
        function executeLogin() {
            var m = document.getElementById("u_mail").value;
            var p = document.getElementById("u_pass").value;
            if(!m || !p) return alert("請輸入帳號密碼");

            document.getElementById("err-log").innerText = "正在通訊中，請稍候...";

            auth.signInWithEmailAndPassword(m, p).then(function(user) {
                alert("驗證通過！進入系統中...");
                sid = m.split("@")[0].replace(/\./g, "_");
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("pos-screen").style.display = "flex";
                startSync();
            }).catch(function(err) {
                document.getElementById("err-log").innerText = "";
                alert("進不去系統！原因：\n" + err.message);
            });
        }

        // 3. 資料同步
        function startSync() {
            db.ref("stores/" + sid + "/inventory").on("value", function(snap) {
                inventory = snap.val() || [];
                renderUI();
            });
            db.ref("stores/" + sid + "/orders").on("value", function(snap) {
                orders = snap.val() || {};
            });
        }

        function renderUI() {
            var box = document.getElementById("menu-box");
            box.innerHTML = "";
            for (var i = 0; i < inventory.length; i++) {
                var cat = inventory[i];
                box.innerHTML += "<h3>" + cat.cat + "</h3>";
                var items = cat.items || [];
                for (var j = 0; j < items.length; j++) {
                    var it = items[j];
                    box.innerHTML += '<div class="p-card" onclick="addToCart(\''+it.id+'\')">' +
                                     '<b>' + it.n + '</b><br><span style="color:#27ae60">$' + it.p + '</span><br>' +
                                     '<small style="color:#999">存:' + it.s + '</small></div>';
                }
            }
        }

        function addToCart(id) {
            for (var i = 0; i < inventory.length; i++) {
                var its = inventory[i].items || [];
                for (var j = 0; j < its.length; j++) {
                    if (its[j].id === id) {
                        cart.push(JSON.parse(JSON.stringify(its[j])));
                        renderCart();
                        return;
                    }
                }
            }
        }

        function renderCart() {
            var b = document.getElementById("cart-box");
            var total = 0; b.innerHTML = "";
            for (var i = 0; i < cart.length; i++) {
                total += cart[i].p;
                b.innerHTML += '<div style="border-bottom:1px solid #f0f0f0; padding:5px 0;">' +
                               '<span>'+cart[i].n+'</span><b style="float:right">$'+cart[i].p+'</b>' +
                               '<br><small onclick="cart.splice('+i+',1);renderCart()" style="color:red; cursor:pointer;">移除</small></div>';
            }
            document.getElementById("total-price").innerText = total;
        }

        // 4. 結帳與後台
        function handleCheckout() {
            if (cart.length === 0) return;
            var now = new Date();
            var d = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2) + "-" + ("0" + now.getDate()).slice(-2);
            
            var data = {
                d: d,
                t: now.getHours() + ":" + now.getMinutes(),
                total: parseInt(document.getElementById("total-price").innerText),
                items: cart.map(function(v){ return {n: v.n, p: v.p}; })
            };

            // 扣庫存
            for (var k = 0; k < cart.length; k++) {
                var cid = cart[k].id;
                for (var i = 0; i < inventory.length; i++) {
                    var its = inventory[i].items || [];
                    for (var j = 0; j < its.length; j++) {
                        if (its[j].id === cid) its[j].s--;
                    }
                }
            }

            db.ref("stores/" + sid + "/orders").push(data).then(function(){
                db.ref("stores/" + sid + "/inventory").set(inventory);
                alert("結帳完成！");
                cart = []; renderCart();
            });
        }

        function checkAdmin() {
            if (prompt("管理密碼") === "8888") {
                document.getElementById("admin-screen").style.display = "block";
                var t = new Date().toISOString().split('T')[0];
                document.getElementById("s_date").value = t;
                document.getElementById("e_date").value = t;
                getReport();
            }
        }

        function closeAdmin() { document.getElementById("admin-screen").style.display = "none"; }

        function getReport() {
            var s = document.getElementById("s_date").value;
            var e = document.getElementById("e_date").value;
            var m = 0, c = 0;
            for (var k in orders) {
                var o = orders[k];
                var d = o.d.replace(/\//g, "-");
                if (d >= s && d <= e) {
                    m += o.total;
                    if (o.items) c += o.items.length;
                }
            }
            document.getElementById("res_m").innerText = "$" + m;
            document.getElementById("res_c").innerText = c + " 杯";
        }

        function saveExcel() {
            var s = document.getElementById("s_date").value;
            var e = document.getElementById("e_date").value;
            var list = [];
            for (var k in orders) {
                var o = orders[k];
                var d = o.d.replace(/\//g, "-");
                if (d >= s && d <= e) {
                    list.push({ "日期": o.d, "總金額": o.total, "明細": o.items?o.items.map(function(i){return i.n;}).join(","):"" });
                }
            }
            if (list.length === 0) return alert("無數據");
            var ws = XLSX.utils.json_to_sheet(list);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sales");
            XLSX.writeFile(wb, "業績報表.xlsx");
        }
    </script>
</body>
</html>
