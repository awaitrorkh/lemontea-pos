<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 穩定修復版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; }
        body { font-family: -apple-system, "Heiti TC", "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg); color: #333; height: 100vh; overflow: hidden; }
        
        /* 登入介面 */
        #login-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-green { width: 100%; padding: 14px; background: var(--p); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* POS 主架構 */
        #pos-screen { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 12px; background: #fff; border-bottom: 1px solid #eee; }
        .nav-btn { padding: 8px 16px; background: #f0f0f0; border: none; border-radius: 20px; white-space: nowrap; font-size: 14px; color: #555; }
        
        /* 點餐格子完美對齊 */
        #main-grid { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 150px; }
        .cat-section h3 { border-left: 5px solid var(--p); padding-left: 12px; margin: 25px 0 15px; font-size: 1.1em; }
        .items-flex { display: flex; flex-wrap: wrap; gap: 10px; }
        .p-card { 
            width: calc(33.33% - 7px); min-height: 95px; background: #fff; padding: 10px 5px; 
            border-radius: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); text-align: center; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box;
        }
        .p-card b { font-size: 13px; line-height: 1.3; margin-bottom: 5px; width: 100%; word-break: break-all; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .p-card .price { color: var(--p); font-weight: 800; }

        /* 購物車 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; padding: 12px; box-sizing: border-box; z-index: 100; }
        .cart-summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        #cart-list { max-height: 250px; overflow-y: auto; display: none; margin-bottom: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }

        /* 管理後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 9000; display: none; padding: 20px; overflow-y: auto; }
        .admin-table-wrap { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        table { width: 100%; font-size: 14px; background: #fff; border-collapse: collapse; }
        td, th { padding: 8px; border: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--p);">小森檸 POS</h1>
            <input type="text" id="acc" placeholder="帳號 (Email)">
            <input type="password" id="pw" placeholder="密碼">
            <button onclick="doLogin()" class="btn-green">登入系統</button>
            <p id="login-msg" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="pos-screen">
        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>
        <div class="cart-bar">
            <div id="cart-list"></div>
            <div class="cart-summary" onclick="toggleCart()">
                <div style="background:#eee; padding:5px 12px; border-radius:15px; font-size:13px;">🛒 已選 <b id="cart-count">0</b> 項</div>
                <div style="font-size: 20px; font-weight: bold;">總計: <span id="total-val">0</span></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="checkout()" style="flex:2; background:var(--p); color:#fff; border:none; padding:15px; border-radius:10px; font-weight:bold;">確認結帳</button>
                <button onclick="openAdmin()" style="flex:1; background:#fff; color:#666; border:1px solid #ddd; border-radius:10px;">⚙️ 後台</button>
            </div>
        </div>
    </div>

    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>店務管理</h2>
            <button onclick="closeAdmin()">返回</button>
        </div>
        <button onclick="addCategory()" class="btn-green" style="background:var(--s); margin-bottom:20px;">＋ 新增分類</button>
        <div id="editor-container"></div>
    </div>

    <script>
        // 1. 初始化檢查
        const config = {
            apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
            authDomain: "lemontea-ad44d.firebaseapp.com",
            databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
            projectId: "lemontea-ad44d",
            storageBucket: "lemontea-ad44d.appspot.com",
            messagingSenderId: "84807565645",
            appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
        };

        let db, auth, storeID = "", inv = [], cart = [], orders = {};

        window.onload = function() {
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                db = firebase.database();
                auth = firebase.auth();
                console.log("Firebase 載入完成");
            } catch (e) {
                alert("系統初始化失敗，請檢查網路連線");
            }
        };

        // 2. 登入邏輯
        function doLogin() {
            const acc = document.getElementById("acc").value;
            const pw = document.getElementById("pw").value;
            if(!acc || !pw) return alert("請輸入帳密");

            auth.signInWithEmailAndPassword(acc, pw).then(u => {
                storeID = acc.split("@")[0].replace(/\./g, "_");
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("pos-screen").style.display = "flex";
                startSync();
            }).catch(e => {
                document.getElementById("login-msg").innerText = "登入錯誤：" + e.message;
            });
        }

        // 3. 資料同步
        function startSync() {
            db.ref(`stores/${storeID}/inventory`).on("value", s => {
                inv = s.val() || [];
                renderPOS();
                if(document.getElementById("admin-screen").style.display === "block") renderEditor();
            });
        }

        // 4. 畫面渲染
        function renderPOS() {
            const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
            tabs.innerHTML = ""; grid.innerHTML = "";
            if(inv.length === 0) grid.innerHTML = "<p style='text-align:center;color:#999;margin-top:50px;'>尚未建立品項，請點擊「後台」新增</p>";
            
            inv.forEach((c, ci) => {
                tabs.innerHTML += `<button class="nav-btn" onclick="document.getElementById('c-${ci}').scrollIntoView()">${c.cat}</button>`;
                let h = `<div id="c-${ci}" class="cat-section"><h3>${c.cat}</h3><div class="items-flex">`;
                (c.items || []).forEach(it => {
                    h += `<div class="p-card" onclick="addCart('${it.id}')"><b>${it.n}</b><span class="price">$${it.p}</span></div>`;
                });
                grid.innerHTML += h + `</div></div>`;
            });
        }

        function addCart(id) {
            inv.forEach(c => {
                (c.items || []).forEach(it => {
                    if(it.id === id) {
                        cart.push({...it});
                        renderCart();
                    }
                });
            });
        }

        function renderCart() {
            const box = document.getElementById("cart-list");
            let t = 0; box.innerHTML = "";
            cart.forEach((it, idx) => {
                t += it.p;
                box.innerHTML += `<div class="cart-row"><span>${it.n}</span><button onclick="cart.splice(${idx},1);renderCart()" style="border:none;background:red;color:white;border-radius:5px;">✕</button></div>`;
            });
            document.getElementById("total-val").innerText = t;
            document.getElementById("cart-count").innerText = cart.length;
        }

        function toggleCart() {
            const cl = document.getElementById('cart-list');
            cl.style.display = (cl.style.display === 'block' ? 'none' : 'block');
        }

        function checkout() {
            if(!cart.length) return alert("空購物車");
            const now = new Date();
            const d = now.toISOString().split('T')[0];
            const o = { d, total: parseInt(document.getElementById("total-val").innerText), items: cart };
            db.ref(`stores/${storeID}/orders`).push(o).then(() => {
                alert("完成！"); cart = []; renderCart();
            });
        }

        // 5. 管理後台功能
        function openAdmin() {
            if(prompt("密碼") === "8888") {
                document.getElementById("admin-screen").style.display = "block";
                renderEditor();
            }
        }
        function closeAdmin() { document.getElementById("admin-screen").style.display = "none"; }

        function renderEditor() {
            const box = document.getElementById("editor-container");
            let h = "";
            inv.forEach((c, ci) => {
                h += `<div class="admin-table-wrap">
                    <h4>${c.cat} <button onclick="delCat(${ci})" style="color:red;float:right">刪除分類</button></h4>
                    <table>
                        <tr><th>名稱</th><th>$</th><th>存</th><th>✕</th></tr>`;
                (c.items || []).forEach((it, ii) => {
                    h += `<tr>
                        <td><input type="text" value="${it.n}" onchange="edit(${ci},${ii},'n',this.value)" style="width:70px"></td>
                        <td><input type="number" value="${it.p}" onchange="edit(${ci},${ii},'p',this.value)" style="width:40px"></td>
                        <td><input type="number" value="${it.s}" onchange="edit(${
