<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 終極管理系統</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); height: 100vh; overflow: hidden; }
        #boot-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        /* 登入介面樣式 */
        .full-screen-center { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-main { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 18px; cursor: pointer; }

        /* POS 主畫面 */
        #pos-screen { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .admin-data { display: none; } /* 敏感營收預設隱藏 */
        
        .nav-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { padding: 8px 18px; background: #eee; border: none; border-radius: 20px; white-space: nowrap; font-size: 14px; }
        #main-grid { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 160px; }
        .items-flex { display: flex; flex-wrap: wrap; gap: 8px; }
        .p-card { width: calc(33.33% - 6px); min-height: 100px; background: #fff; padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; }

        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #ddd; padding: 12px; box-sizing: border-box; }
        
        /* 管理後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 9500; display: none; padding: 20px; overflow-y: auto; }
        .staff-tag { display: inline-block; background: rgba(255,255,255,0.3); padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 5px; }
        
        /* 找零彈窗 */
        #change-modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000; display:none; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="boot-screen"><h2>系統啟動中...</h2></div>

    <!-- 第一層：分店登入 -->
    <div id="store-login" class="full-screen-center" style="display:none;">
        <div class="login-card">
            <h2 style="color:var(--p)">分店系統登入</h2>
            <input type="text" id="store-acc" placeholder="分店 Email">
            <input type="password" id="store-pw" placeholder="分店密碼">
            <button class="btn-main" onclick="POS.storeLogin()">開啟裝置</button>
        </div>
    </div>

    <!-- 第二層：員工登入 -->
    <div id="staff-login" class="full-screen-center" style="display:none;">
        <div class="login-card">
            <h2 style="color:var(--p)">員工登入</h2>
            <p style="font-size:14px; color:#666;">第一次使用請輸入: 1234</p>
            <input type="password" id="staff-code" placeholder="請輸入代碼" pattern="[0-9]*" inputmode="numeric" style="font-size:30px; text-align:center; letter-spacing:10px;">
            <button class="btn-main" onclick="POS.staffLogin()">進入點餐介面</button>
            <p onclick="firebase.auth().signOut()" style="margin-top:20px; color:#999; font-size:12px; cursor:pointer;">登出分店帳號</p>
        </div>
    </div>

    <!-- POS 介面 -->
    <div id="pos-screen">
        <header>
            <div class="admin-data">今日營收 <b id="st-sum">$0</b></div>
            <div>員工: <span id="current-staff-name" class="staff-tag">載入中</span></div>
            <div style="display:flex; gap:5px;">
                <button class="admin-data" onclick="POS.exportCSV()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:6px 10px; border-radius:5px;">報表</button>
                <button onclick="POS.staffLogout()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:6px 10px; border-radius:5px;">交班</button>
            </div>
        </header>

        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>

        <div class="cart-bar">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
                <span>🛒 已選: <span id="cart-count">0</span> 杯</span>
                <span>總計: $<span id="total-val">0</span></span>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="POS.openChangeModal()" style="flex:3;" class="btn-main">確認結帳</button>
                <button onclick="POS.openAdmin()" style="flex:1; background:#f0f0f0; border:1px solid #ddd; border-radius:10px; color:#666;">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>老闆管理後台</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'">關閉</button>
        </div>
        <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin:20px 0; border:1px solid #eee;">
            <h3>👥 員工名單管理</h3>
            <div id="staff-list-editor"></div>
            <button onclick="POS.addStaff()" style="width:100%; margin-top:10px; padding:10px; border-radius:5px; border:1px dashed #ccc;">＋ 新增員工</button>
        </div>
        <h3>📋 菜單編輯</h3>
        <button onclick="POS.addCat()" style="width:100%; padding:15px; background:var(--s); color:white; border:none; border-radius:10px;">＋ 新增分類</button>
        <div id="editor" style="margin-top:15px;"></div>
    </div>

    <!-- 找零彈窗 -->
    <div id="change-modal">
        <div class="login-card">
            <h3>結帳找零</h3>
            <div id="modal-total" style="font-size:20px; margin-bottom:10px;">0</div>
            <input type="number" id="cash-in" placeholder="顧客支付" style="font-size:24px; text-align:center;">
            <div id="change-val" style="font-size:32px; font-weight:bold; color:#e74c3c; margin:15px 0;">$0</div>
            <button onclick="POS.checkout()" class="btn-main">完成結帳</button>
            <button onclick="document.getElementById('change-modal').style.display='none'" style="margin-top:10px; background:none; border:none; color:#666;">取消</button>
        </div>
    </div>

    <script>
        const POS = {
            config: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                authDomain: "lemontea-ad44d.firebaseapp.com",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d",
                storageBucket: "lemontea-ad44d.appspot.com",
                messagingSenderId: "84807565645",
                appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
            },
            storeID: "", isAdminAccount: false,
            inv: [], sales: [], cart: [], staffList: [], currentStaff: null,

            init() {
                if (!firebase.apps.length) firebase.initializeApp(this.config);
                firebase.auth().onAuthStateChanged(user => {
                    document.getElementById("boot-screen").style.display = "none";
                    if (user) {
                        const email = user.email.toLowerCase();
                        this.storeID = email.split("@")[0].replace(/\./g, "_");
                        this.isAdminAccount = email.includes("admin");
                        this.startSync();
                        this.showStaffLogin();
                    } else {
                        this.showStoreLogin();
                    }
                });
            },

            showStoreLogin() { document.getElementById("store-login").style.display = "flex"; document.getElementById("staff-login").style.display = "none"; document.getElementById("pos-screen").style.display = "none"; },
            showStaffLogin() { document.getElementById("store-login").style.display = "none"; document.getElementById("staff-login").style.display = "flex"; document.getElementById("pos-screen").style.display = "none"; },
            showPOS() { document.getElementById("staff-login").style.display = "none"; document.getElementById("pos-screen").style.display = "flex"; this.applyUIPerms(); },

            storeLogin() {
                const a = document.getElementById("store-acc").value, p = document.getElementById("store-pw").value;
                firebase.auth().signInWithEmailAndPassword(a, p).catch(e => alert("分店登入失敗"));
            },

            startSync() {
                const db = firebase.database();
                db.ref(`global_menu/inventory`).on("value", s => { this.inv = s.val() || []; this.renderGrid(); });
                
                // --- 核心修正：自動確保有 1234 預設碼 ---
                db.ref(`stores/${this.storeID}/staff`).on("value", s => { 
                    const data = s.val();
                    if (!data || data.length === 0) {
                        this.staffList = [{name: "老闆", code: "1234"}];
                        db.ref(`stores/${this.storeID}/staff`).set(this.staffList);
                    } else {
                        this.staffList = data;
                    }
                });

                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = Object.values(s.val() || {});
                    if(this.isAdminAccount) this.updateRevenueUI();
                });
            },

            staffLogin() {
                const code = document.getElementById("staff-code").value;
                const found = this.staffList.find(s => s.code === code);
                if (found) {
                    this.currentStaff = found;
                    document.getElementById("current-staff-name").innerText = found.name;
                    this.showPOS();
                } else {
                    alert("代碼錯誤！");
                }
            },

            staffLogout() { this.currentStaff = null; document.getElementById("staff-code").value = ""; this.showStaffLogin(); },
            applyUIPerms() {
                const displayStyle = this.isAdminAccount ? 'block' : 'none';
                document.querySelectorAll('.admin-data').forEach(el => el.style.display = displayStyle);
            },

            renderGrid() {
                const tabs = document.getElementById("nav-tabs"), grid = document.getElementById("main-grid");
                tabs.innerHTML = ""; grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    tabs.innerHTML += `<button class="nav-btn" onclick="document.getElementById('c-${ci}').scrollIntoView({behavior:'smooth'})">${c.cat}</button>`;
                    let h = `<div id="c-${ci}"><h3>${c.cat}</h3><div class="items-flex">`;
                    (c.items || []).forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.id}')"><b>${it.n}</b><br>$${it.p}</div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(id) {
                this.inv.forEach(c => (c.items || []).forEach(it => {
                    if(it.id == id) { this.cart.push({...it}); this.updateCartUI(); }
                }));
            },

            updateCartUI() {
                let total = 0; this.cart.forEach(it => total += it.p);
                document.getElementById("cart-count").innerText = this.cart.length;
                document.getElementById("total-val").innerText = total;
            },

            openChangeModal() {
                if(this.cart.length === 0) return;
                const total = parseInt(document.getElementById("total-val").innerText);
                document.getElementById("modal-total").innerText = "應收金額: $" + total;
                document.getElementById("cash-in").value = "";
                document.getElementById("change-val").innerText = "$0";
                document.getElementById("change-modal").style.display = "flex";
                document.getElementById("cash-in").oninput = () => {
                    const cash = Number(document.getElementById("cash-in").value) || 0;
                    document.getElementById("change-val").innerText = "$" + Math.max(0, cash - total);
                };
            },

            checkout() {
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                this.cart.forEach(it => {
                    firebase.database().ref(`stores/${this.storeID}/sales/${today}`).push({
                        time, n: it.n, p: it.p, staff: this.currentStaff.name 
                    });
                });
                alert("結帳成功！");
                this.cart = []; this.updateCartUI();
                document.getElementById("change-modal").style.display = "none";
            },

            updateRevenueUI() {
                let sum = 0; this.sales.forEach(s => sum += s.p);
                document.getElementById("st-sum").innerText = "$" + sum;
            },

            exportCSV() {
                if(this.sales.length === 0) return alert("尚無營業資料");
                let csv = "\uFEFF時間,員工,品項,金額\n";
                this.sales.forEach(s => csv += `${s.time},${s.staff},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
                a.download = `報表_${this.storeID}_${new Date().toLocaleDateString()}.csv`; a.click();
            },

            openAdmin() {
                if (prompt("請輸入老闆管理密碼") === "8888") {
                    document.getElementById("admin-screen").style.display = "block";
                    this.renderStaffList();
                    this.renderEditor();
                }
            },

            renderStaffList() {
                const box = document.getElementById("staff-list-editor");
                let h = "";
                this.staffList.forEach((s, si) => {
                    h += `<div style="display:flex; gap:5px; margin-bottom:5px;">
                        <input type="text" value="${s.name}" style="flex:2;" onchange="POS.staffList[${si}].name=this.value;POS.saveStaff()">
                        <input type="text" value="${s.code}" style="flex:1;" onchange="POS.staffList[${si}].code=this.value;POS.saveStaff()">
                        <button onclick="if(confirm('刪除？')){POS.staffList.splice(${si},1);POS.saveStaff();POS.renderStaffList()}" style="background:red; color:white; border:none; border-radius:5px;">✕</button>
                    </div>`;
                });
                box.innerHTML = h;
            },

            addStaff() { this.staffList.push({name: "新員工", code: "0000"}); this.saveStaff(); this.renderStaffList(); },
            saveStaff() { firebase.database().ref(`stores/${this.storeID}/staff`).set(this.staffList); },

            renderEditor() {
                const box = document.getElementById("editor"); let h = "";
                this.inv.forEach((c, ci) => {
                    h += `<div style="background:#eee;padding:10px;margin-bottom:10px;border-radius:10px;">
                        <input type="text" value="${c.cat}" onchange="POS.inv[${ci}].cat=this.value;POS.saveInv()">
                        <div>`;
                    (c.items || []).forEach((it, ii) => {
                        h += `<div style="display:flex;gap:5px;margin-top:5px;">
                            <input type="text" value="${it.n}" style="flex:2;" onchange="POS.inv[${ci}].items[${ii}].n=this.value;POS.saveInv()">
                            <input type="number" value="${it.p}" style="flex:1;" onchange="POS.inv[${ci}].items[${ii}].p=Number(this.value);POS.saveInv()">
                            <button onclick="POS.inv[${ci}].items.splice(${ii},1);POS.saveInv();POS.renderEditor()">✕</button>
                        </div>`;
                    });
                    h += `</div><button onclick="POS.inv[${ci}].items.push({id:Date.now(),n:'新飲品',p:50});POS.saveInv();POS.renderEditor()">＋</button></div>`;
                });
                box.innerHTML = h;
            },
            saveInv() { firebase.database().ref(`global_menu/inventory`).set(this.inv); },
            addCat() { const n = prompt("分類名稱"); if(n){ this.inv.push({cat:n, items:[]}); this.saveInv(); this.renderEditor(); } }
        };
        window.onload = () => POS.init();
    </script>
</body>
</html>
