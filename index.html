<script>
    // 1. Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
        authDomain: "lemontea-ad44d.firebaseapp.com",
        databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
        projectId: "lemontea-ad44d",
        storageBucket: "lemontea-ad44d.appspot.com",
        messagingSenderId: "84807565645",
        appId: "1:84807565645:web:d4607f39cbb5c751e0f704"
    };

    // 2. 全域變數 (統一在這裡定義，檔案其他地方不要再出現 let inv 或 const defaultInv)
    let db;
    window.currentStore = ""; 
    let inv = []; 
    let orders = [];
    let cart = []; 
    let currentPay = '現金';

    const defaultInv = [
        { cat: "🧸 招牌商品", items: [{id: "A01", n: "預設商品", c: 0, p: 0, s: 0}] }
    ];

    // 3. 初始化 Firebase
    try {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    } catch(e) { console.error("Firebase 初始化失敗", e); }

    // 4. 登入邏輯
    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        if(!email || !pass) return alert("請輸入帳號密碼");
        
        firebase.auth().signInWithEmailAndPassword(email, pass)
            .then((user) => {
                window.currentStore = email.split('@')[0];
                document.getElementById('login-overlay').style.display = 'none';
                alert("店鋪登入成功：" + window.currentStore);
                loadData(); 
            })
            .catch((e) => alert("登入失敗：" + e.message));
    }

    // 5. 資料讀取 (店鋪分流)
    function loadData() {
        if(!window.currentStore || !db) return;
        const path = `stores/${window.currentStore}`;
        
        db.ref(`${path}/inventory`).on('value', snap => {
            inv = snap.val() || defaultInv;
            initUI();
        });

        db.ref(`${path}/orders`).on('value', snap => {
            const data = snap.val();
            orders = data ? Object.keys(data).map(k => ({...data[k], firebaseKey: k})) : [];
            orders.sort((a,b) => (b.d+b.t).localeCompare(a.d+a.t));
            updateLog();
            renderStatTable();
        });
    }

    // 6. 同步資料
    function syncToDB() {
        if(db && window.currentStore) {
            db.ref(`stores/${window.currentStore}/inventory`).set(inv);
        }
    }

    // 7. POS 功能邏輯
    function initUI() {
        const area = document.getElementById('item-area'), nav = document.getElementById('navbar');
        area.innerHTML = ''; nav.innerHTML = '';
        inv.forEach((cat, idx) => {
            nav.innerHTML += `<div class="nav-btn" onclick="document.getElementById('c${idx}').scrollIntoView()">${cat.cat}</div>`;
            let gridHtml = `<div class="cat-title" id="c${idx}">${cat.cat}</div><div class="product-grid">`;
            (cat.items || []).forEach(it => {
                gridHtml += `<div class="p-btn" onclick="addCart('${it.id}')">
                    <div class="p-name">${it.id} ${it.n}</div>
                    <div class="p-price">$${it.p}</div>
                    <div class="p-stock">存:${it.s}</div>
                </div>`;
            });
            area.innerHTML += gridHtml + '</div>';
        });
        updateCatSelect();
    }

    function addCart(id) {
        let target = null;
        inv.forEach(c => (c.items || []).forEach(i => { if(i.id === id) target = i; }));
        if(target) { cart.push({...target}); renderCart(); }
    }

    function renderCart() {
        document.getElementById('cart-list').innerHTML = cart.map((it, i) => `
            <div class="cart-item"><span>${it.n}</span><b>$${it.p}</b>
            <span onclick="cart.splice(${i},1);renderCart()" style="color:red; cursor:pointer;">✕</span></div>`).join('');
        calc();
    }

    function calc() {
        const total = cart.reduce((a,b)=>a+b.p, 0) - Number(document.getElementById('discount').value || 0);
        document.getElementById('final-total').innerText = Math.max(0, total);
        calcChange();
    }

    function calcChange() {
        const t = Number(document.getElementById('final-total').innerText), p = Number(document.getElementById('cash-in').value || 0);
        document.getElementById('cash-change').innerText = p > t ? p - t : 0;
    }

    function setPay(m) {
        currentPay = m;
        document.getElementById('btn-cash').className = m==='現金'?'pay-btn active':'pay-btn';
        document.getElementById('btn-elec').className = m==='電支'?'pay-btn active':'pay-btn';
    }

    function submitOrder() {
        if(!cart.length || !window.currentStore) return;
        const total = Number(document.getElementById('final-total').innerText);
        const path = `stores/${window.currentStore}`;
        const orderData = { 
            t: new Date().toLocaleTimeString('zh-TW', {hour12:false}), 
            d: new Date().toLocaleDateString('zh-TW'),
            total, pay: currentPay, items: [...cart]
        };
        cart.forEach(item => { 
            inv.forEach(c => (c.items || []).forEach(i => { if(i.id === item.id) i.s--; })); 
        });
        db.ref(`${path}/orders`).push(orderData);
        db.ref(`${path}/inventory`).set(inv);
        alert("結帳成功！");
        cart=[]; renderCart(); 
    }

    // 基本管理界面切換
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
    function toggleHistory() { const p = document.getElementById('history-panel'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
    function updateLog() { /* 日誌顯示代碼 */ }
    function renderStatTable() { /* 統計顯示代碼 */ }
    function updateCatSelect() { /* 下拉選單更新 */ }
</script>
