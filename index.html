<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 類別管理版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 登入 */
        #staff-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; padding: 40px 30px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-card input { font-size: 32px; text-align: center; letter-spacing: 10px; width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin: 20px 0; outline: none; }

        /* 主畫面 */
        header { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 250px; }
        .cat-section { margin-bottom: 20px; }
        .cat-name { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #555; border-left: 4px solid var(--p); padding-left: 10px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .p-card { background: #fff; padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; height: 85px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .p-card b { font-size: 13px; margin-bottom: 4px; color: #333; }
        .p-card span { color: var(--p); font-weight: bold; font-size: 14px; }

        /* 底部操作 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 10px 15px 25px; border-top: 2px solid #eee; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .cart-list { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 10px; height: 40px; align-items: center; }
        .cart-tag { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; padding: 5px 12px; border-radius: 8px; white-space: nowrap; font-size: 13px; }
        .btn-group { display: flex; gap: 10px; height: 60px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 12px; flex: 2; font-size: 20px; font-weight: bold; }
        .btn-tool { background: #f8f9fa; border: 1px solid #ddd; border-radius: 12px; width: 60px; font-size: 24px; }

        /* 計算機 */
        #checkout-screen { position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; z-index: 2000; display: none; flex-direction: column; padding: 20px; border-radius: 25px 25px 0 0; color: white; }
        .calc-display { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .num-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .n-btn { background: #445566; border: none; color: white; font-size: 24px; border-radius: 12px; height: 60px; font-weight: bold; }
        .n-btn.action { background: var(--s); }
        .n-btn.confirm { background: var(--p); grid-column: span 2; }

        /* 管理後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 3000; display: none; overflow-y: auto; padding: 20px; }
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="staff-login">
        <div class="login-card">
            <h2 style="color:var(--p)">小森檸 POS</h2>
            <input type="password" id="staff-input" placeholder="代碼" maxlength="4" inputmode="numeric">
            <button onclick="POS.login()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--p); color:white; font-size:18px; font-weight:bold;">登入</button>
        </div>
    </div>

    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <span id="user-display">👤 讀取中...</span>
            <span>小森檸 & 泰奶</span>
        </header>
        <div id="main-grid"></div>
        <div class="cart-bar">
            <div class="cart-list" id="cart-ui"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span>共 <b id="cart-num">0</b> 杯</span>
                <span style="font-size:30px; font-weight:900; color:var(--s)">$<span id="cart-total">0</span></span>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCalc()">結帳找零</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 計算機 -->
    <div id="checkout-screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
            <b>收銀找零</b>
            <span onclick="POS.closeCalc()" style="font-size:28px;">✕</span>
        </div>
        <div class="calc-display">
            <div><p style="font-size:12px;">應收</p><h2 id="calc-need">$0</h2></div>
            <div style="text-align:right;"><p style="font-size:12px;">實收</p><h2 id="calc-in" style="color:var(--p)">0</h2></div>
        </div>
        <div style="background:var(--s); padding:10px; border-radius:10px; text-align:center; margin-bottom:20px;">
            找零：<b>$<span id="calc-change">0</span></b>
        </div>
        <div class="num-grid">
            <button class="n-btn" onclick="POS.press('7')">7</button><button class="n-btn" onclick="POS.press('8')">8</button><button class="n-btn" onclick="POS.press('9')">9</button><button class="n-btn action" onclick="POS.press('C')">C</button>
            <button class="n-btn" onclick="POS.press('4')">4</button><button class="n-btn" onclick="POS.press('5')">5</button><button class="n-btn" onclick="POS.press('6')">6</button><button class="n-btn action" onclick="POS.press('00')">00</button>
            <button class="n-btn" onclick="POS.press('1')">1</button><button class="n-btn" onclick="POS.press('2')">2</button><button class="n-btn" onclick="POS.press('3')">3</button><button class="n-btn" onclick="POS.press('0')">0</button>
            <button class="n-btn confirm" onclick="POS.submitPay()">確認結帳</button>
            <button class="n-btn action" style="grid-column: span 2; background:#555;" onclick="POS.closeCalc()">取消</button>
        </div>
    </div>

    <!-- 管理後台 -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>管理後台</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'">關閉</button>
        </div>
        <div class="admin-box" style="background:var(--p); color:white; text-align:center;">
            <h1 id="ad-sum">$0</h1>
            <p id="ad-count">總杯數：0 杯</p>
        </div>

        <!-- 類別管理 -->
        <div class="admin-box">
            <h3>1. 新增類別</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-cat" placeholder="例如：奶茶類" style="flex:1">
                <button onclick="POS.addCat()" style="padding:10px; background:var(--p); color:white; border:none; border-radius:8px;">新增類別</button>
            </div>
        </div>

        <!-- 品項管理 -->
        <div class="admin-box">
            <h3>2. 新增品項</h3>
            <select id="cat-select" style="width:100%"><option value="">-- 請先選擇大類 --</option></select>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="new-it-n" placeholder="品項名稱" style="flex:2">
                <input type="number" id="new-it-p" placeholder="價格" style="flex:1">
                <button onclick="POS.addItem()" style="padding:10px; background:var(--p); color:white; border:none; border-radius:8px;">新增品項</button>
            </div>
        </div>
        
        <button onclick="POS.exportCSV()" style="width:100%; padding:15px; background:var(--s); color:white; border:none; border-radius:12px; font-weight:bold;">📊 匯出今日報表</button>
    </div>

    <script>
        const POS = {
            dbCfg: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main",
            staff: [], inv: [], cart: [], sales: [], user: null, inStr: "0",

            init() {
                firebase.initializeApp(this.dbCfg);
                const db = firebase.database();
                
                db.ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staff = s.val() || [{name:"老闆", code:"8888"}];
                });

                db.ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [];
                    this.renderGrid();
                    this.updateAdminCats();
                });

                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = s.val() ? Object.values(s.val()) : [];
                    const sum = this.sales.reduce((a, b) => a + b.p, 0);
                    document.getElementById("ad-sum").innerText = "$" + sum;
                    document.getElementById("ad-count").innerText = `總銷售：${this.sales.length} 杯`;
                });
            },

            login() {
                const code = document.getElementById("staff-input").value;
                const found = this.staff.find(s => s.code == code);
                if(found) {
                    this.user = found;
                    document.getElementById("user-display").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("代碼錯誤"); }
            },

            renderGrid() {
                const grid = document.getElementById("main-grid"); grid.innerHTML = "";
                if(this.inv.length === 0) { grid.innerHTML = "<p style='text-align:center; color:#999; margin-top:50px;'>請至後台新增類別與品項</p>"; return; }
                this.inv.forEach(c => {
                    let h = `<div class="cat-section"><div class="cat-name">${c.cat}</div><div class="items-flex">`;
                    if(c.items) {
                        c.items.forEach(it => {
                            h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`;
                        });
                    }
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({ n, p, id: Date.now() });
                this.updateCartUI();
            },

            updateCartUI() {
                const ui = document.getElementById("cart-ui"); ui.innerHTML = "";
                let total = 0;
                this.cart.forEach(it => {
                    total += it.p;
                    const tag = document.createElement("div"); tag.className = "cart-tag";
                    tag.innerText = it.n;
                    tag.onclick = () => { this.cart = this.cart.filter(x => x.id != it.id); this.updateCartUI(); };
                    ui.appendChild(tag);
                });
                document.getElementById("cart-total").innerText = total;
                document.getElementById("cart-num").innerText = this.cart.length;
                ui.scrollLeft = ui.scrollWidth;
            },

            openCalc() {
                const total = document.getElementById("cart-total").innerText;
                if(total == "0") return;
                this.inStr = "0";
                document.getElementById("calc-in").innerText = "0";
                document.getElementById("calc-change").innerText = "0";
                document.getElementById("calc-need").innerText = "$" + total;
                document.getElementById("checkout-screen").style.display = "flex";
            },

            closeCalc() { document.getElementById("checkout-screen").style.display = "none"; },

            press(v) {
                if(v === 'C') this.inStr = "0";
                else if(this.inStr === "0") this.inStr = v;
                else this.inStr += v;
                
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const input = parseInt(this.inStr);
                document.getElementById("calc-in").innerText = this.inStr;
                const change = input - need;
                document.getElementById("calc-change").innerText = change > 0 ? change : 0;
            },

            submitPay() {
                const need = parseInt(document.getElementById("calc-need").innerText.replace("$",""));
                const cash = parseInt(this.inStr);
                if(cash < need) return alert("金額不足");
                
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                this.cart.forEach(it => {
                    firebase.database().ref(`stores/${this.storeID}/sales/${today}`).push({
                        t: time, s: this.user.name, n: it.n, p: it.p
                    });
                });
                alert("結帳成功！找零：$" + (cash - need));
                this.cart = []; this.updateCartUI(); this.closeCalc();
            },

            openAdmin() { if(prompt("管理密碼")==="8888") document.getElementById("admin-screen").style.display="block"; },

            // 類別與品項管理
            updateAdminCats() {
                const sel = document.getElementById("cat-select");
                sel.innerHTML = '<option value="">-- 選擇大類 --</option>';
                this.inv.forEach((c, i) => {
                    sel.innerHTML += `<option value="${i}">${c.cat}</option>`;
                });
            },

            addCat() {
                const name = document.getElementById("new-cat").value;
                if(name) {
                    this.inv.push({ cat: name, items: [] });
                    firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    document.getElementById("new-cat").value = "";
                }
            },

            addItem() {
                const idx = document.getElementById("cat-select").value;
                const n = document.getElementById("new-it-n").value;
                const p = parseInt(document.getElementById("new-it-p").value);
                if(idx !== "" && n && p) {
                    if(!this.inv[idx].items) this.inv[idx].items = [];
                    this.inv[idx].items.push({ n, p });
                    firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    document.getElementById("new-it-n").value = "";
                    document.getElementById("new-it-p").value = "";
                } else { alert("請填寫完整資訊並選擇類別"); }
            },

            exportCSV() {
                let csv = "\uFEFF時間,員工,品項,金額\n";
                this.sales.forEach(s => csv += `${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `報表.csv`;
                link.click();
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
