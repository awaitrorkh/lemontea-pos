<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小森檸 POS - 全功能整合版</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p: #27ae60; --s: #e67e22; --bg: #f4f7f6; --danger: #f5222d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 登入介面 */
        #staff-login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; padding: 40px 30px; border-radius: 25px; width: 320px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-card input { font-size: 32px; text-align: center; letter-spacing: 10px; width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin: 20px 0; outline: none; }

        /* 主畫面 */
        header { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-bar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: #fff; border-bottom: 1px solid #ddd; }
        .nav-btn { padding: 10px 20px; background: #eee; border: none; border-radius: 20px; white-space: nowrap; font-weight: bold; }
        .nav-btn.active { background: var(--p); color: #fff; }

        /* 商品 3 欄佈局 */
        #main-grid { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 300px; }
        .category-group { margin-bottom: 20px; }
        .category-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--p); padding-left: 10px; }
        .items-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .p-card { background: #fff; padding: 15px 5px; border-radius: 15px; text-align: center; border: 1px solid #eee; height: 90px; display: flex; flex-direction: column; justify-content: center; }
        .p-card b { font-size: 14px; display: block; margin-bottom: 5px; }
        .p-card span { color: var(--p); font-weight: bold; }

        /* 底部操作 */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px 20px 30px; border-top: 2px solid #eee; z-index: 100; }
        .cart-list { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; height: 45px; align-items: center; }
        .cart-tag { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; padding: 6px 12px; border-radius: 10px; white-space: nowrap; font-size: 14px; }
        .btn-group { display: flex; gap: 10px; height: 60px; }
        .btn-pay { background: var(--p); color: #fff; border: none; border-radius: 15px; flex: 2; font-size: 22px; font-weight: bold; }
        .btn-tool { background: #f8f9fa; border: 1px solid #ddd; border-radius: 15px; width: 60px; font-size: 24px; }

        /* 結帳收銀機模式 (Overlay) */
        #checkout-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; flex-direction: column; color: white; padding: 20px; }
        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; max-width: 400px; margin: 0 auto; width: 100%; }
        .num-btn { background: #444; border: none; color: white; font-size: 28px; border-radius: 15px; height: 70px; }
        .num-btn.confirm { background: var(--p); grid-column: span 2; }
        .num-btn.clear { background: var(--danger); }

        /* 管理後台 */
        #admin-screen { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; padding: 20px; }
        .admin-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- 1. 登入 -->
    <div id="staff-login">
        <div class="login-card">
            <h1 style="color:var(--p)">小森檸 POS</h1>
            <input type="password" id="staff-input" placeholder="代碼" maxlength="4" inputmode="numeric">
            <button onclick="POS.login()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--p); color:white; font-size:18px; font-weight:bold;">登入</button>
        </div>
    </div>

    <!-- 2. 主畫面 -->
    <div id="pos-screen" style="display:none; flex-direction:column; height:100vh;">
        <header>
            <b id="user-display">讀取中...</b>
            <span id="rev-display" style="font-size:14px; opacity:0.8">今日: $0</span>
        </header>
        <div class="nav-bar" id="nav-tabs"></div>
        <div id="main-grid"></div>
        <div class="cart-bar">
            <div class="cart-list" id="cart-ui"></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span style="color:#666">共 <b id="cart-num">0</b> 杯</span>
                <span style="font-size:30px; font-weight:bold; color:var(--s)">$<span id="cart-total">0</span></span>
            </div>
            <div class="btn-group">
                <button class="btn-pay" onclick="POS.openCheckout()">結帳</button>
                <button class="btn-tool" onclick="location.reload()">🔄</button>
                <button class="btn-tool" onclick="POS.openAdmin()">⚙️</button>
            </div>
        </div>
    </div>

    <!-- 3. 直覺式結帳機 (數字鍵盤) -->
    <div id="checkout-screen">
        <div style="text-align:right; font-size:24px; margin-bottom:20px;" onclick="POS.closeCheckout()">✕ 關閉</div>
        <div style="text-align:center; margin-bottom:20px;">
            <p style="font-size:18px; opacity:0.8;">應收金額</p>
            <h1 style="font-size:50px; color:var(--p)">$<span id="pay-need">0</span></h1>
        </div>
        <div style="text-align:center; margin-bottom:30px;">
            <p style="font-size:18px; opacity:0.8;">實收金額</p>
            <div id="pay-input" style="font-size:60px; font-weight:bold; border-bottom:2px solid #fff; display:inline-block; min-width:150px; height:70px;">0</div>
        </div>
        <div class="num-pad">
            <button class="num-btn" onclick="POS.pressNum('1')">1</button>
            <button class="num-btn" onclick="POS.pressNum('2')">2</button>
            <button class="num-btn" onclick="POS.pressNum('3')">3</button>
            <button class="num-btn" onclick="POS.pressNum('4')">4</button>
            <button class="num-btn" onclick="POS.pressNum('5')">5</button>
            <button class="num-btn" onclick="POS.pressNum('6')">6</button>
            <button class="num-btn" onclick="POS.pressNum('7')">7</button>
            <button class="num-btn" onclick="POS.pressNum('8')">8</button>
            <button class="num-btn" onclick="POS.pressNum('9')">9</button>
            <button class="num-btn clear" onclick="POS.pressNum('C')">清除</button>
            <button class="num-btn" onclick="POS.pressNum('0')">0</button>
            <button class="num-btn" onclick="POS.pressNum('00')">00</button>
            <button class="num-btn confirm" onclick="POS.finishPay()">確認收錢</button>
        </div>
    </div>

    <!-- 4. 管理後台 (含菜單管理) -->
    <div id="admin-screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>管理後台</h2>
            <button onclick="document.getElementById('admin-screen').style.display='none'">關閉</button>
        </div>
        <div class="admin-box" style="background:var(--p); color:white; text-align:center;">
            <p>今日營業額</p>
            <h1 id="ad-total">$0</h1>
        </div>
        <div class="admin-box">
            <h3>新增菜單品項</h3>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="ad-item-n" placeholder="品項名" style="flex:2; padding:10px;">
                <input type="number" id="ad-item-p" placeholder="價格" style="flex:1; padding:10px;">
                <button onclick="POS.addItem()" style="padding:10px; background:var(--p); color:white; border:none;">新增</button>
            </div>
            <div id="ad-menu-list" style="margin-top:15px; font-size:14px;"></div>
        </div>
        <button onclick="POS.exportCSV()" style="width:100%; padding:15px; background:var(--s); color:white; border:none; border-radius:10px;">匯出今日報表</button>
    </div>

    <script>
        const POS = {
            cfg: {
                apiKey: "AIzaSyDXSWgD5PqSqfu1xCEcghRXVnJfztv2iV8",
                databaseURL: "https://lemontea-ad44d-default-rtdb.firebaseio.com",
                projectId: "lemontea-ad44d"
            },
            storeID: "LittleForest_Main",
            staff: [], inv: [], cart: [], sales: [], user: null, payStr: "0",

            init() {
                firebase.initializeApp(this.cfg);
                const db = firebase.database();
                
                // 1. 監聽員工
                db.ref(`stores/${this.storeID}/staff`).on("value", s => {
                    this.staff = s.val() || [{name:"店長", code:"8888"}];
                    if(!s.val()) db.ref(`stores/${this.storeID}/staff`).set(this.staff);
                });

                // 2. 監聽菜單 (自動補完機制)
                db.ref(`stores/${this.storeID}/inventory`).on("value", s => {
                    this.inv = s.val() || [{cat:"預設飲品", items:[{n:"招牌檸檬茶", p:55}]}];
                    if(!s.val()) db.ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    this.renderGrid();
                    this.renderAdminMenu();
                });

                // 3. 監聽營收
                const today = new Date().toISOString().split('T')[0];
                db.ref(`stores/${this.storeID}/sales/${today}`).on("value", s => {
                    this.sales = s.val() ? Object.values(s.val()) : [];
                    const sum = this.sales.reduce((a, b) => a + b.p, 0);
                    document.getElementById("rev-display").innerText = `今日: $${sum}`;
                    document.getElementById("ad-total").innerText = `$${sum}`;
                });
            },

            login() {
                const code = document.getElementById("staff-input").value;
                const found = this.staff.find(s => s.code == code);
                if(found) {
                    this.user = found;
                    document.getElementById("user-display").innerText = "👤 " + found.name;
                    document.getElementById("staff-login").style.display = "none";
                    document.getElementById("pos-screen").style.display = "flex";
                } else { alert("代碼錯誤"); }
            },

            renderGrid() {
                const grid = document.getElementById("main-grid"); grid.innerHTML = "";
                this.inv.forEach((c, ci) => {
                    let h = `<div class="category-group"><div class="category-title">${c.cat}</div><div class="items-flex">`;
                    c.items.forEach(it => {
                        h += `<div class="p-card" onclick="POS.addCart('${it.n}', ${it.p})"><b>${it.n}</b><span>$${it.p}</span></div>`;
                    });
                    grid.innerHTML += h + `</div></div>`;
                });
            },

            addCart(n, p) {
                this.cart.push({ n, p, id: Date.now() });
                this.updateCart();
            },

            updateCart() {
                const ui = document.getElementById("cart-ui"); ui.innerHTML = "";
                let total = 0;
                this.cart.forEach(it => {
                    total += it.p;
                    const tag = document.createElement("div");
                    tag.className = "cart-tag";
                    tag.innerText = it.n;
                    tag.onclick = () => { this.cart = this.cart.filter(x => x.id != it.id); this.updateCart(); };
                    ui.appendChild(tag);
                });
                document.getElementById("cart-total").innerText = total;
                document.getElementById("cart-num").innerText = this.cart.length;
                ui.scrollLeft = ui.scrollWidth;
            },

            openCheckout() {
                if(this.cart.length == 0) return;
                this.payStr = "0";
                document.getElementById("pay-input").innerText = "0";
                document.getElementById("pay-need").innerText = document.getElementById("cart-total").innerText;
                document.getElementById("checkout-screen").style.display = "flex";
            },

            closeCheckout() { document.getElementById("checkout-screen").style.display = "none"; },

            pressNum(v) {
                if(v == 'C') this.payStr = "0";
                else if(this.payStr == "0") this.payStr = v;
                else this.payStr += v;
                document.getElementById("pay-input").innerText = this.payStr;
            },

            finishPay() {
                const total = parseInt(document.getElementById("pay-need").innerText);
                const cash = parseInt(this.payStr);
                if(cash < total) return alert("金額不足！");
                
                const change = cash - total;
                alert(`結帳完成！\n\n應收：$${total}\n實收：$${cash}\n👉 找零：$${change}`);
                
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('zh-TW', {hour12:false});
                this.cart.forEach(it => {
                    firebase.database().ref(`stores/${this.storeID}/sales/${today}`).push({
                        t: time, s: this.user.name, n: it.n, p: it.p
                    });
                });
                this.cart = [];
                this.updateCart();
                this.closeCheckout();
            },

            openAdmin() {
                if(prompt("管理密碼") == "8888") {
                    document.getElementById("admin-screen").style.display = "block";
                }
            },

            renderAdminMenu() {
                const list = document.getElementById("ad-menu-list");
                list.innerHTML = "<b>目前菜單：</b><br>";
                this.inv[0].items.forEach((it, i) => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span>${it.n} ($${it.p})</span>
                        <button onclick="POS.delItem(${i})" style="color:red">刪除</button>
                    </div>`;
                });
            },

            addItem() {
                const n = document.getElementById("ad-item-n").value;
                const p = parseInt(document.getElementById("ad-item-p").value);
                if(n && p) {
                    this.inv[0].items.push({n, p});
                    firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
                    document.getElementById("ad-item-n").value = "";
                    document.getElementById("ad-item-p").value = "";
                }
            },

            delItem(i) {
                if(confirm("確定刪除此品項？")) {
                    this.inv[0].items.splice(i, 1);
                    firebase.database().ref(`stores/${this.storeID}/inventory`).set(this.inv);
                }
            },

            exportCSV() {
                let csv = "\uFEFF時間,員工,品項,金額\n";
                this.sales.forEach(s => csv += `${s.t},${s.s},${s.n},${s.p}\n`);
                const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `報表.csv`;
                link.click();
            }
        };

        window.onload = () => POS.init();
    </script>
</body>
</html>
